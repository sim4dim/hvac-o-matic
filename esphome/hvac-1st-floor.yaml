esphome:
  name: hvac-1st-floor
  friendly_name: "HVAC 1st Floor Register"
  on_boot:
    priority: -100  # run after everything is initialized
    then:
      - number.set:
          id: servo_angle
          value: 0

esp32:
  board: heltec_wifi_kit_32_V3
  framework:
    type: esp-idf

wifi:
  ssid: !secret hvac_wifi_ssid
  password: !secret hvac_wifi_password
  manual_ip:
    static_ip: 192.168.1.63
    gateway: 192.168.1.1
    subnet: 255.255.255.0

  ap:
    ssid: "HVAC-1stFloor-Fallback"
    password: "hvacfallback"

captive_portal:

logger:

api:
  encryption:
    key: !secret hvac_api_key

ota:
  - platform: esphome
    password: !secret hvac_ota_password

# ---------------------------------------------------------------------------
# Globals for display screensaver
# ---------------------------------------------------------------------------
globals:
  - id: display_mode
    type: uint8_t
    restore_value: false
    initial_value: "0"  # 0=screensaver, 1=full info
  - id: saver_x
    type: uint8_t
    restore_value: false
    initial_value: "10"
  - id: saver_y
    type: uint8_t
    restore_value: false
    initial_value: "20"

# ---------------------------------------------------------------------------
# Display cycling: full info 5s every 30s, screensaver the rest
# ---------------------------------------------------------------------------
interval:
  - interval: 30s
    then:
      - globals.set:
          id: display_mode
          value: "1"
      - delay: 5s
      - globals.set:
          id: display_mode
          value: "0"
  - interval: 3s
    then:
      - lambda: |-
          // Randomize screensaver position (font_large ~50px wide, 16px tall)
          if (id(display_mode) == 0) {
            id(saver_x) = esp_random() % 78;
            id(saver_y) = esp_random() % 48;
          }

i2c:
  sda: GPIO17
  scl: GPIO18
  scan: false
  frequency: 400kHz

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    reset_pin: GPIO21
    flip_x: false
    flip_y: false
    update_interval: 2s
    lambda: |-
      if (id(display_mode) == 1) {
        // Full info screen - shown 5s every 30s
        it.printf(0, 0, id(font_small), "HVAC 1st Floor");
        it.printf(0, 16, id(font_small), "IP: %s", id(ip_address).state.c_str());
        it.printf(0, 32, id(font_large), "Angle: %.0f", id(servo_angle).state);
        if (id(servo_angle).state == 0) {
          it.printf(0, 52, id(font_small), "CLOSED");
        } else {
          it.printf(0, 52, id(font_small), "OPEN");
        }
      } else {
        // Screensaver - angle at random position to prevent burn-in
        it.printf(id(saver_x), id(saver_y), id(font_large), "%.0f%s",
          id(servo_angle).state, id(servo_angle).state == 0 ? " CL" : "\xC2\xB0");
      }

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_large
    size: 16

# Servo output on GPIO46
output:
  - platform: ledc
    pin: GPIO46
    id: servo_pwm
    frequency: 50Hz

servo:
  - id: vent_servo
    output: servo_pwm
    auto_detach_time: 3s
    transition_length: 2s

# Number entity for HA control - 0 to 45 degrees
number:
  - platform: template
    name: "Servo Angle"
    id: servo_angle
    min_value: 0
    max_value: 45
    step: 1
    unit_of_measurement: "°"
    icon: "mdi:rotate-right"
    optimistic: true
    restore_value: false
    initial_value: 0
    set_action:
      - servo.write:
          id: vent_servo
          # ESPHome servo: -1.0 = 0°, 1.0 = 180°
          # Map 0-45° to the -1.0 to -0.5 range
          level: !lambda "return (x / 90.0) - 1.0;"
      - logger.log:
          format: "Servo angle set to %.0f°"
          args: ['x']

# Binary sensor for open/closed state
binary_sensor:
  - platform: template
    name: "Register Open"
    icon: "mdi:air-filter"
    lambda: |-
      return id(servo_angle).state > 0;

# Diagnostic sensors
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"

button:
  - platform: restart
    name: "Restart"

text_sensor:
  - platform: wifi_info
    ip_address:
      id: ip_address
      name: "IP Address"

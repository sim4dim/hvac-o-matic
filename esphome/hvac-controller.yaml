esphome:
  name: hvac-controller
  friendly_name: "HVAC Controller"
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.flash_size: 16MB

# ===========================================================================
# WIRING DIAGRAM
# ===========================================================================
#
# Board: ESP32-S3-WROOM-1-N16R8 (AYWHP) + Kootek 8-Channel 5V Relay Module
# Sensors: BME280 (supply duct), BME680 (return duct), SSD1306 OLED
#
# ESP32-S3 N16R8: 16MB flash, 8MB PSRAM (octal)
# Avoid GPIOs: 0, 3, 26-32 (PSRAM/flash), 45, 46 (strapping), 19-20 (USB)
#
# IMPORTANT: Add 10K pull-up resistors from each relay GPIO to 3.3V!
# Without pull-ups, GPIOs float LOW during boot and relays fire briefly.
# This could cause spurious furnace activation on every reboot.
#
#   3.3V ──┬──┬──┬──┬──┬──┬──┬──
#          R  R  R  R  R  R  R  R    (10K each)
#          │  │  │  │  │  │  │  │
#          4  5  6  7 15 16 17 18    (GPIO -> relay board IN1-IN8)
#
# Relays are active-low. Pull-ups keep them OFF during boot.
# On boot, all relays de-energized -> changeover on NC -> Pearl in control.
#
# ---------------------------------------------------------------------------
# RELAY ASSIGNMENTS
# ---------------------------------------------------------------------------
#
#  Relay  GPIO  Function          Notes
#  ─────  ────  ────────────────  ─────────────────────────────────
#  1       4    Heat control      Switches R -> W (ESP32 mode only)
#  2       5    Cool control      Switches R -> Y (ESP32 mode only)
#  3       6    Fan control       Switches R -> G (ESP32 mode only)
#  4       7    UV light          On when any airflow active
#  5      15    W changeover      NC=Pearl W, NO=Relay 1 output
#  6      16    Y changeover      NC=Pearl Y, NO=Relay 2 output
#  7      17    G changeover      NC=Pearl G, NO=Relay 3 output
#  8      18    Spare
#
# ---------------------------------------------------------------------------
# 24VAC THERMOSTAT WIRING
# ---------------------------------------------------------------------------
#
#  FURNACE                  RELAY BOARD                   PEARL THERMOSTAT
#  ───────                  ───────────                   ────────────────
#
#  R (24V hot) ─────┬───────────────────────────────────── R
#                   │
#                   ├── Relay 1 COM ── NO ──→ Relay 5 NO
#                   ├── Relay 2 COM ── NO ──→ Relay 6 NO
#                   └── Relay 3 COM ── NO ──→ Relay 7 NO
#
#  W (heat) ──────────── Relay 5 COM
#                            NC ←─────────────────────────── W
#                            NO ←── Relay 1 output
#
#  Y (cool) ──────────── Relay 6 COM
#                            NC ←─────────────────────────── Y
#                            NO ←── Relay 2 output
#
#  G (fan) ───────────── Relay 7 COM
#                            NC ←─────────────────────────── G
#                            NO ←── Relay 3 output
#
#  C (common) ──────────────────────────────────────────── C
#
# ---------------------------------------------------------------------------
# OPERATING MODES
# ---------------------------------------------------------------------------
#
#  NORMAL (changeover relays 5,6,7 energized -> NO position):
#    ESP32 relays 1,2,3 control furnace W,Y,G via changeover NO
#    Pearl is disconnected from furnace (but still powered via R,C)
#
#  BYPASS (changeover relays 5,6,7 de-energized -> NC position):
#    Pearl thermostat controls furnace directly via changeover NC
#    ESP32 control relays 1,2,3 don't matter (disconnected)
#    Triggered by: button press, HA command, or 60-min watchdog
#
#  FAIL-SAFE (ESP32 dead / no power):
#    All relays de-energize -> NC -> Pearl controls furnace
#    No code needed. Hardware fail-safe by design.
#
# ---------------------------------------------------------------------------
# OTHER CONNECTIONS
# ---------------------------------------------------------------------------
#
#  GPIO11 - Bypass toggle switch (INPUT_PULLUP, position tracks bypass state)
#  GPIO10 - Warning LED (on during bypass)
#  GPIO8  - I2C SDA (BME280, BME680, SSD1306)
#  GPIO9  - I2C SCL
#
# ===========================================================================

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret hvac_wifi_ssid
  password: !secret hvac_wifi_password
  power_save_mode: none
  ap:
    ssid: "HVAC-Controller-Fallback"
    password: "hvacfallback"

logger:
  level: INFO

api:
  id: ha_api
  reboot_timeout: 15min
  encryption:
    key: !secret hvac_api_key
  on_client_connected:
    - globals.set:
        id: last_api_time
        value: !lambda "return millis();"
    - globals.set:
        id: watchdog_tripped
        value: "false"
    # HA connected - exit bypass (unless physical toggle overrides)
    - lambda: |-
        if (!id(toggle_bypass)) {
          id(bypass_sw).turn_off();
        } else {
          ESP_LOGI("bypass", "API reconnected but physical toggle is in bypass - staying");
        }
  on_client_disconnected:
    - logger.log: "API client disconnected - watchdog timer active"

ota:
  - platform: esphome
    password: !secret hvac_ota_password

web_server:
  port: 80
  version: 3

# ---------------------------------------------------------------------------
# Globals for watchdog and display state
# ---------------------------------------------------------------------------
globals:
  - id: last_api_time
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: watchdog_tripped
    type: bool
    restore_value: false
    initial_value: "false"
  - id: display_page
    type: uint8_t
    restore_value: false
    initial_value: "0"
  - id: toggle_bypass
    type: bool
    restore_value: false
    initial_value: "false"
  - id: heat_on_since
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: cool_on_since
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: heat_last_off
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: cool_last_off
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: last_heartbeat
    type: uint32_t
    restore_value: false
    initial_value: "0"

# ---------------------------------------------------------------------------
# MQTT - heartbeat subscriber for keenect watchdog
# ---------------------------------------------------------------------------
mqtt:
  broker: 192.168.1.10
  discovery: false
  on_json_message:
    - topic: keenect/heartbeat
      then:
        - lambda: |-
            id(last_heartbeat) = millis();
            // Sync relay state from keenect on boot or reconnect
            bool want_heat = x["heat"] | false;
            bool want_cool = x["cool"] | false;
            bool want_fan  = x["fan"]  | false;
            // Only apply if in ESP32 control mode (not bypass/watchdog)
            if (id(watchdog_tripped)) return;
            if (id(bypass_sw).state) return;
            auto set_sw = [](switch_::Switch *sw, bool want) {
              if (sw->state != want) {
                if (want) sw->turn_on(); else sw->turn_off();
              }
            };
            set_sw(id(heat_sw), want_heat);
            set_sw(id(cool_sw), want_cool);
            set_sw(id(fan_sw), want_fan);

# ---------------------------------------------------------------------------
# Watchdog: enter bypass after 60 min with no API connection
# ---------------------------------------------------------------------------
interval:
  - interval: 30s
    then:
      - lambda: |-
          // Skip watchdog until first API connection
          if (id(last_api_time) == 0) return;
          if (id(watchdog_tripped)) return;
          if (id(ha_api).is_connected()) {
            id(last_api_time) = millis();
            return;
          }
          uint32_t elapsed = millis() - id(last_api_time);
          if (elapsed > 3600000) {  // 60 minutes
            ESP_LOGW("watchdog", "No API for 60 min - entering bypass");
            id(watchdog_tripped) = true;
            id(bypass_sw).turn_on();
          }
  # Low memory warning
  - interval: 30s
    then:
      - lambda: |-
          float heap_kb = heap_caps_get_free_size(MALLOC_CAP_8BIT) / 1024.0;
          if (heap_kb < 15.0) {
            ESP_LOGE("memory", "CRITICAL: Free heap %.1f kB - REBOOTING!", heap_kb);
            App.safe_reboot();
          } else if (heap_kb < 30.0) {
            ESP_LOGE("memory", "CRITICAL: Free heap %.1f kB!", heap_kb);
          } else if (heap_kb < 60.0) {
            ESP_LOGW("memory", "Low heap: %.1f kB", heap_kb);
          }
  # Safety checks
  - interval: 30s
    then:
      - lambda: |-
          uint32_t now = millis();

          // --- Max-run timer: heat (2 hours) ---
          if (id(heat_on_since) > 0 && now - id(heat_on_since) > 7200000) {
            ESP_LOGE("safety", "Heat max-run exceeded (2h) - forcing off + bypass");
            id(heat_sw).turn_off();
            id(bypass_sw).turn_on();
          }

          // --- Max-run timer: cool (2 hours) ---
          if (id(cool_on_since) > 0 && now - id(cool_on_since) > 7200000) {
            ESP_LOGE("safety", "Cool max-run exceeded (2h) - forcing off + bypass");
            id(cool_sw).turn_off();
            id(bypass_sw).turn_on();
          }

          // --- Supply temp high limit (160F) ---
          if (id(heat_on_since) > 0 && id(supply_temp).has_state() && id(supply_temp).state > 160.0) {
            ESP_LOGE("safety", "Supply temp > 160F - heat exchanger limit exceeded");
            id(heat_sw).turn_off();
            id(bypass_sw).turn_on();
          }

          // --- Supply temp low warning (< 80F after 10 min heating) ---
          if (id(heat_on_since) > 0 && now - id(heat_on_since) > 600000
              && id(supply_temp).has_state() && id(supply_temp).state < 80.0) {
            ESP_LOGW("safety", "Supply temp < 80F after 10min - possible igniter failure");
          }

          // --- Overpressure check (delta > 10 hPa) ---
          if ((id(heat_on_since) > 0 || id(cool_on_since) > 0)
              && id(pressure_delta).has_state()
              && fabs(id(pressure_delta).state) > 10.0) {
            ESP_LOGE("safety", "Overpressure detected (dP=%.1f hPa) - forcing off + bypass",
                     id(pressure_delta).state);
            id(heat_sw).turn_off();
            id(cool_sw).turn_off();
            id(bypass_sw).turn_on();
          }

          // --- Keenect heartbeat watchdog (5 min) ---
          if (id(last_heartbeat) > 0 && now - id(last_heartbeat) > 300000) {
            ESP_LOGW("safety", "No keenect heartbeat for 5min - activating bypass");
            id(bypass_sw).turn_on();
          }

  # Display page toggle
  - interval: 5s
    then:
      - lambda: "id(display_page) = 1 - id(display_page);"
  # Status LED color
  - interval: 500ms
    then:
      - lambda: |-
          static bool flash = false;
          flash = !flash;
          auto led = id(status_led);
          uint8_t r = 0, g = 0, b = 0;
          if (id(watchdog_tripped)) {
            if (flash) { r = 255; g = 77; b = 0; }
          } else if (id(bypass_sw).state) {
            r = 128; g = 0; b = 255;
          } else if (id(heat_sw).state) {
            r = 255; g = 0; b = 0;
          } else if (id(cool_sw).state) {
            r = 0; g = 0; b = 255;
          } else {
            r = 0; g = 255; b = 0;
          }
          auto out = (esphome::light::AddressableLight *)led->get_output();
          out->get(0) = Color(r, g, b);
          out->schedule_show();

# ---------------------------------------------------------------------------
# I2C bus - shared by BME280, BME680, SSD1306
# ---------------------------------------------------------------------------
i2c:
  sda: GPIO8
  scl: GPIO9
  frequency: 100kHz

# ---------------------------------------------------------------------------
# Relay switches with safety interlocks
# ---------------------------------------------------------------------------
# All relay GPIOs are active-low and MUST have external 10K pull-ups to 3.3V
switch:
  # --- Control relays (1-4) - only active in ESP32 mode ---

  # HEAT and COOL are interlocked - cannot be on simultaneously
  - platform: gpio
    pin:
      number: GPIO4     # Relay 1
      inverted: true
    name: "Heat"
    id: heat_sw
    icon: "mdi:fire"
    restore_mode: ALWAYS_OFF
    interlock: [heat_sw, cool_sw]
    interlock_wait_time: 500ms
    on_turn_on:
      - lambda: |-
          if (id(heat_last_off) > 0 && millis() - id(heat_last_off) < 120000) {
            ESP_LOGW("safety", "Short-cycle protection: heat blocked (< 120s since last off)");
            id(heat_sw).turn_off();
            return;
          }
          id(heat_on_since) = millis();
      - switch.turn_on: fan_sw
      - switch.turn_on: uv_sw
    on_turn_off:
      - lambda: |-
          id(heat_on_since) = 0;
          id(heat_last_off) = millis();
          if (!id(cool_sw).state) {
            id(fan_sw).turn_off();
            id(uv_sw).turn_off();
          }

  - platform: gpio
    pin:
      number: GPIO5     # Relay 2
      inverted: true
    name: "Cool"
    id: cool_sw
    icon: "mdi:snowflake"
    restore_mode: ALWAYS_OFF
    interlock: [heat_sw, cool_sw]
    interlock_wait_time: 500ms
    on_turn_on:
      - lambda: |-
          if (id(cool_last_off) > 0 && millis() - id(cool_last_off) < 300000) {
            ESP_LOGW("safety", "Short-cycle protection: cool blocked (< 300s since last off)");
            id(cool_sw).turn_off();
            return;
          }
          id(cool_on_since) = millis();
      - switch.turn_on: fan_sw
      - switch.turn_on: uv_sw
    on_turn_off:
      - lambda: |-
          id(cool_on_since) = 0;
          id(cool_last_off) = millis();
          if (!id(heat_sw).state) {
            id(fan_sw).turn_off();
            id(uv_sw).turn_off();
          }

  - platform: gpio
    pin:
      number: GPIO6     # Relay 3
      inverted: true
    name: "Fan"
    id: fan_sw
    icon: "mdi:fan"
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin:
      number: GPIO7     # Relay 4
      inverted: true
    name: "UV"
    id: uv_sw
    icon: "mdi:lightbulb-alert"
    restore_mode: ALWAYS_OFF

  # --- Changeover relays (5-7) - switch furnace between ESP32 and Pearl ---
  # De-energized (NC) = Pearl controls furnace (fail-safe default)
  # Energized (NO) = ESP32 controls furnace

  - platform: gpio
    pin:
      number: GPIO15    # Relay 5 - W changeover
      inverted: true
    name: "Changeover W"
    id: changeover_w
    icon: "mdi:swap-horizontal"
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: gpio
    pin:
      number: GPIO16    # Relay 6 - Y changeover
      inverted: true
    name: "Changeover Y"
    id: changeover_y
    icon: "mdi:swap-horizontal"
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: gpio
    pin:
      number: GPIO17    # Relay 7 - G changeover
      inverted: true
    name: "Changeover G"
    id: changeover_g
    icon: "mdi:swap-horizontal"
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: gpio
    pin:
      number: GPIO18
      inverted: true
    name: "Spare"
    id: spare_sw
    icon: "mdi:chip"
    restore_mode: ALWAYS_OFF
    internal: true

  # --- Bypass (virtual switch - controls changeover relays as a group) ---

  - platform: template
    name: "Bypass"
    id: bypass_sw
    icon: "mdi:gate-open"
    restore_mode: ALWAYS_OFF
    optimistic: false
    turn_on_action:
      # Enter bypass: kill ESP32 control, de-energize changeover -> Pearl
      - switch.turn_off: heat_sw
      - switch.turn_off: cool_sw
      - switch.turn_off: fan_sw
      - switch.turn_off: uv_sw
      - switch.turn_off: changeover_w
      - switch.turn_off: changeover_y
      - switch.turn_off: changeover_g
      - output.turn_on: warning_led
      - lambda: "id(bypass_sw).publish_state(true);"
    turn_off_action:
      - if:
          condition:
            lambda: "return id(toggle_bypass);"
          then:
            - lambda: 'ESP_LOGW("bypass", "Cannot exit bypass - physical toggle overrides");'
          else:
            - switch.turn_on: changeover_w
            - delay: 200ms
            - switch.turn_on: changeover_y
            - delay: 200ms
            - switch.turn_on: changeover_g
            - output.turn_off: warning_led
            - lambda: "id(bypass_sw).publish_state(false);"

  - platform: restart
    name: "Restart"

# ---------------------------------------------------------------------------
# Onboard RGB LED (WS2812 on GPIO48)
# ---------------------------------------------------------------------------
light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    pin: GPIO48
    num_leds: 1
    rgb_order: GRB
    name: "Status LED"
    id: status_led
    internal: true

# ---------------------------------------------------------------------------
# Warning LED
# ---------------------------------------------------------------------------
output:
  - platform: gpio
    pin: GPIO10
    id: warning_led

# ---------------------------------------------------------------------------
# Bypass toggle switch (GPIO11)
# ---------------------------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO11
      mode: INPUT_PULLUP
      inverted: true
    name: "Bypass Toggle"
    id: bypass_toggle
    icon: "mdi:toggle-switch"
    device_class: safety
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_state:
      then:
        - lambda: |-
            id(toggle_bypass) = x;
            if (x) {
              id(bypass_sw).turn_on();
            } else {
              if (!id(watchdog_tripped)) {
                id(bypass_sw).turn_off();
              }
            }

  - platform: status
    name: "Status"

# ---------------------------------------------------------------------------
# Environmental sensors
# ---------------------------------------------------------------------------
sensor:
  # Supply duct - BME280 at 0x76
  - platform: bme280_i2c
    address: 0x76
    update_interval: 30s
    temperature:
      name: "Supply Temperature"
      id: supply_temp
    humidity:
      name: "Supply Humidity"
      id: supply_hum
    pressure:
      name: "Supply Pressure"
      id: supply_pres

  # Return duct - BME680 at 0x77
  - platform: bme680
    address: 0x77
    update_interval: 30s
    temperature:
      name: "Return Temperature"
      id: return_temp
    humidity:
      name: "Return Humidity"
      id: return_hum
    pressure:
      name: "Return Pressure"
      id: return_pres
    gas_resistance:
      name: "Return VOC"
      id: return_voc
      unit_of_measurement: "kΩ"
      filters:
        - skip_initial: 10
        - multiply: 0.001  # Ohm -> kOhm

  # Computed: pressure delta (supply - return)
  - platform: template
    name: "Pressure Delta"
    id: pressure_delta
    unit_of_measurement: "hPa"
    icon: "mdi:gauge"
    lambda: |-
      if (id(supply_pres).has_state() && id(return_pres).has_state()) {
        return id(supply_pres).state - id(return_pres).state;
      }
      return {};
    update_interval: 30s

  # Computed: temperature delta (supply - return)
  - platform: template
    name: "Temperature Delta"
    id: temp_delta
    unit_of_measurement: "°F"
    icon: "mdi:thermometer-lines"
    accuracy_decimals: 1
    lambda: |-
      if (id(supply_temp).has_state() && id(return_temp).has_state()) {
        return id(supply_temp).state - id(return_temp).state;
      }
      return {};
    update_interval: 30s

  # Diagnostics
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
  - platform: internal_temperature
    name: "ESP32 Temperature"
    update_interval: 60s

  # Memory monitoring
  - platform: template
    name: "Free Heap"
    id: free_heap
    unit_of_measurement: "kB"
    accuracy_decimals: 1
    entity_category: diagnostic
    lambda: 'return heap_caps_get_free_size(MALLOC_CAP_8BIT) / 1024.0;'
    update_interval: 30s
  - platform: template
    name: "Free PSRAM"
    id: free_psram
    unit_of_measurement: "kB"
    accuracy_decimals: 0
    entity_category: diagnostic
    lambda: 'return heap_caps_get_free_size(MALLOC_CAP_SPIRAM) / 1024.0;'
    update_interval: 30s

# ---------------------------------------------------------------------------
# Display - SSD1306 128x64 OLED
# ---------------------------------------------------------------------------
font:
  - file: "gfonts://Roboto"
    id: font1
    size: 12

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 5s
    lambda: |-
      if (id(display_page) == 0) {
        // Status screen
        it.printf(0, 0, id(font1), "HVAC Controller");
        it.printf(0, 13, id(font1), "H:%s  C:%s",
          id(heat_sw).state ? "ON" : "--",
          id(cool_sw).state ? "ON" : "--");
        it.printf(0, 26, id(font1), "F:%s  UV:%s",
          id(fan_sw).state ? "ON" : "--",
          id(uv_sw).state ? "ON" : "--");
        if (id(bypass_sw).state) {
          if (id(toggle_bypass)) {
            it.printf(0, 39, id(font1), "* BYPASS (SW) *");
          } else if (id(watchdog_tripped)) {
            it.printf(0, 39, id(font1), "* BYPASS (WD) *");
          } else {
            it.printf(0, 39, id(font1), "** BYPASS **");
          }
        } else {
          it.printf(0, 39, id(font1), "Bypass: OFF");
        }
        float heap_kb = heap_caps_get_free_size(MALLOC_CAP_8BIT) / 1024.0;
        if (heap_kb < 60.0) {
          it.printf(0, 52, id(font1), "!Heap:%.0fkB!", heap_kb);
        } else {
          it.printf(0, 52, id(font1), "Heap: %.0f kB", heap_kb);
        }
      } else {
        // Sensor screen
        if (id(supply_temp).has_state()) {
          it.printf(0, 0, id(font1), "S:%.1fF %d%%",
            id(supply_temp).state, (int)id(supply_hum).state);
        } else {
          it.printf(0, 0, id(font1), "S:--");
        }
        if (id(return_temp).has_state()) {
          it.printf(0, 13, id(font1), "R:%.1fF %d%%",
            id(return_temp).state, (int)id(return_hum).state);
        } else {
          it.printf(0, 13, id(font1), "R:--");
        }
        if (id(pressure_delta).has_state()) {
          it.printf(0, 26, id(font1), "dP: %.1f hPa", id(pressure_delta).state);
        }
        if (id(supply_temp).has_state() && id(return_temp).has_state()) {
          float dt = id(supply_temp).state - id(return_temp).state;
          it.printf(0, 39, id(font1), "dT: %+.1fF", dt);
        }
        if (id(return_voc).has_state()) {
          auto voc = id(return_voc).state;
          const char *label = voc > 200 ? "Good" : voc > 50 ? "Mod" : "Poor";
          it.printf(0, 52, id(font1), "VOC:%s(%.0f)", label, voc);
        }
      }

text_sensor:
  - platform: wifi_info
    ip_address:
      id: ip_addr
      name: "IP Address"

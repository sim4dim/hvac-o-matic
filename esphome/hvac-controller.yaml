esphome:
  name: hvac-controller
  friendly_name: "HVAC Controller"

# ===========================================================================
# WIRING DIAGRAM
# ===========================================================================
#
# Board: ESP32-S3-WROOM-1-N16R8 (AYWHP) + Kootek 8-Channel 5V Relay Module
# Sensors: BME280 (supply duct), BME680 (return duct), SSD1306 OLED
#
# ESP32-S3 N16R8: 16MB flash, 8MB PSRAM (octal)
# Avoid GPIOs: 0, 3, 26-32 (PSRAM/flash), 45, 46 (strapping), 19-20 (USB)
#
# IMPORTANT: Add 10K pull-up resistors from each relay GPIO to 3.3V!
# Without pull-ups, GPIOs float LOW during boot and relays fire briefly.
# This could cause spurious furnace activation on every reboot.
#
#   3.3V ──┬──┬──┬──┬──┬──┬──┬──
#          R  R  R  R  R  R  R  R    (10K each)
#          │  │  │  │  │  │  │  │
#          4  5  6  7 15 16 17 18    (GPIO -> relay board IN1-IN8)
#
# Relays are active-low. Pull-ups keep them OFF during boot.
# On boot, all relays de-energized -> changeover on NC -> Pearl in control.
#
# ---------------------------------------------------------------------------
# RELAY ASSIGNMENTS
# ---------------------------------------------------------------------------
#
#  Relay  GPIO  Function          Notes
#  ─────  ────  ────────────────  ─────────────────────────────────
#  1       4    Heat control      Switches R -> W (ESP32 mode only)
#  2       5    Cool control      Switches R -> Y (ESP32 mode only)
#  3       6    Fan control       Switches R -> G (ESP32 mode only)
#  4       7    UV light          On when any airflow active
#  5      15    W changeover      NC=Pearl W, NO=Relay 1 output
#  6      16    Y changeover      NC=Pearl Y, NO=Relay 2 output
#  7      17    G changeover      NC=Pearl G, NO=Relay 3 output
#  8      18    Spare
#
# ---------------------------------------------------------------------------
# 24VAC THERMOSTAT WIRING
# ---------------------------------------------------------------------------
#
#  FURNACE                  RELAY BOARD                   PEARL THERMOSTAT
#  ───────                  ───────────                   ────────────────
#
#  R (24V hot) ─────┬───────────────────────────────────── R
#                   │
#                   ├── Relay 1 COM ── NO ──→ Relay 5 NO
#                   ├── Relay 2 COM ── NO ──→ Relay 6 NO
#                   └── Relay 3 COM ── NO ──→ Relay 7 NO
#
#  W (heat) ──────────── Relay 5 COM
#                            NC ←─────────────────────────── W
#                            NO ←── Relay 1 output
#
#  Y (cool) ──────────── Relay 6 COM
#                            NC ←─────────────────────────── Y
#                            NO ←── Relay 2 output
#
#  G (fan) ───────────── Relay 7 COM
#                            NC ←─────────────────────────── G
#                            NO ←── Relay 3 output
#
#  C (common) ──────────────────────────────────────────── C
#
# ---------------------------------------------------------------------------
# OPERATING MODES
# ---------------------------------------------------------------------------
#
#  NORMAL (changeover relays 5,6,7 energized -> NO position):
#    ESP32 relays 1,2,3 control furnace W,Y,G via changeover NO
#    Pearl is disconnected from furnace (but still powered via R,C)
#
#  BYPASS (changeover relays 5,6,7 de-energized -> NC position):
#    Pearl thermostat controls furnace directly via changeover NC
#    ESP32 control relays 1,2,3 don't matter (disconnected)
#    Triggered by: button press, HA command, or 60-min watchdog
#
#  FAIL-SAFE (ESP32 dead / no power):
#    All relays de-energize -> NC -> Pearl controls furnace
#    No code needed. Hardware fail-safe by design.
#
# ---------------------------------------------------------------------------
# OTHER CONNECTIONS
# ---------------------------------------------------------------------------
#
#  GPIO11 - Bypass button (INPUT_PULLUP, press to toggle bypass)
#  GPIO10 - Warning LED (on during bypass)
#  GPIO8  - I2C SDA (BME280, BME680, SSD1306)
#  GPIO9  - I2C SCL
#
# ===========================================================================

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret hvac_wifi_ssid
  password: !secret hvac_wifi_password
  power_save_mode: none
  ap:
    ssid: "HVAC-Controller-Fallback"
    password: "hvacfallback"

logger:
  level: INFO

api:
  id: ha_api
  encryption:
    key: !secret hvac_api_key
  on_client_connected:
    - globals.set:
        id: last_api_time
        value: !lambda "return millis();"
    - globals.set:
        id: watchdog_tripped
        value: "false"
    # HA connected - exit bypass, ESP32 takes control
    - switch.turn_off: bypass_sw
  on_client_disconnected:
    - logger.log: "API client disconnected - watchdog timer active"

ota:
  - platform: esphome
    password: !secret hvac_ota_password

# ---------------------------------------------------------------------------
# Globals for watchdog and display state
# ---------------------------------------------------------------------------
globals:
  - id: last_api_time
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: watchdog_tripped
    type: bool
    restore_value: false
    initial_value: "false"
  - id: display_page
    type: uint8_t
    restore_value: false
    initial_value: "0"

# ---------------------------------------------------------------------------
# Watchdog: enter bypass after 60 min with no API connection
# ---------------------------------------------------------------------------
interval:
  - interval: 30s
    then:
      - lambda: |-
          // Skip watchdog until first API connection
          if (id(last_api_time) == 0) return;
          if (id(watchdog_tripped)) return;
          if (id(ha_api).is_connected()) {
            id(last_api_time) = millis();
            return;
          }
          uint32_t elapsed = millis() - id(last_api_time);
          if (elapsed > 3600000) {  // 60 minutes
            ESP_LOGW("watchdog", "No API for 60 min - entering bypass");
            id(watchdog_tripped) = true;
            id(bypass_sw).turn_on();
          }
  # Display page toggle
  - interval: 5s
    then:
      - lambda: "id(display_page) = 1 - id(display_page);"
  # Status LED: red=heat, blue=cool, green=idle, flash yellow=error
  - interval: 500ms
    then:
      - lambda: |-
          static bool flash = false;
          flash = !flash;
          if (id(watchdog_tripped)) {
            // Error: flash yellow on/off
            if (flash) {
              auto call = id(status_led).turn_on();
              call.set_rgb(1.0, 0.7, 0.0);
              call.set_brightness(0.5);
              call.perform();
            } else {
              auto call = id(status_led).turn_off();
              call.perform();
            }
          } else if (id(bypass_sw).state) {
            // Bypass: alternate yellow / blue
            auto call = id(status_led).turn_on();
            call.set_brightness(0.5);
            if (flash) {
              call.set_rgb(1.0, 0.7, 0.0);
            } else {
              call.set_rgb(0.0, 0.0, 1.0);
            }
            call.perform();
          } else if (id(heat_sw).state) {
            auto call = id(status_led).turn_on();
            call.set_rgb(1.0, 0.0, 0.0);
            call.set_brightness(0.5);
            call.perform();
          } else if (id(cool_sw).state) {
            auto call = id(status_led).turn_on();
            call.set_rgb(0.0, 0.0, 1.0);
            call.set_brightness(0.5);
            call.perform();
          } else {
            auto call = id(status_led).turn_on();
            call.set_rgb(0.0, 1.0, 0.0);
            call.set_brightness(0.3);
            call.perform();
          }

# ---------------------------------------------------------------------------
# I2C bus - shared by BME280, BME680, SSD1306
# ---------------------------------------------------------------------------
i2c:
  sda: GPIO8
  scl: GPIO9
  frequency: 400kHz

# ---------------------------------------------------------------------------
# Relay switches with safety interlocks
# ---------------------------------------------------------------------------
# All relay GPIOs are active-low and MUST have external 10K pull-ups to 3.3V
switch:
  # --- Control relays (1-4) - only active in ESP32 mode ---

  # HEAT and COOL are interlocked - cannot be on simultaneously
  - platform: gpio
    pin: GPIO4     # Relay 1
    name: "Heat"
    id: heat_sw
    icon: "mdi:fire"
    restore_mode: ALWAYS_OFF
    interlock: [heat_sw, cool_sw]
    interlock_wait_time: 500ms
    on_turn_on:
      - switch.turn_on: fan_sw
      - switch.turn_on: uv_sw
    on_turn_off:
      - lambda: |-
          if (!id(cool_sw).state && !id(fan_sw).state) {
            id(uv_sw).turn_off();
          }

  - platform: gpio
    pin: GPIO5     # Relay 2
    name: "Cool"
    id: cool_sw
    icon: "mdi:snowflake"
    restore_mode: ALWAYS_OFF
    interlock: [heat_sw, cool_sw]
    interlock_wait_time: 500ms
    on_turn_on:
      - switch.turn_on: fan_sw
      - switch.turn_on: uv_sw
    on_turn_off:
      - lambda: |-
          if (!id(heat_sw).state && !id(fan_sw).state) {
            id(uv_sw).turn_off();
          }

  - platform: gpio
    pin: GPIO6     # Relay 3
    name: "Fan"
    id: fan_sw
    icon: "mdi:fan"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - switch.turn_on: uv_sw
    on_turn_off:
      - lambda: |-
          if (!id(heat_sw).state && !id(cool_sw).state) {
            id(uv_sw).turn_off();
          }

  - platform: gpio
    pin: GPIO7     # Relay 4
    name: "UV"
    id: uv_sw
    icon: "mdi:lightbulb-alert"
    restore_mode: ALWAYS_OFF

  # --- Changeover relays (5-7) - switch furnace between ESP32 and Pearl ---
  # De-energized (NC) = Pearl controls furnace (fail-safe default)
  # Energized (NO) = ESP32 controls furnace

  - platform: gpio
    pin: GPIO15    # Relay 5 - W changeover
    name: "Changeover W"
    id: changeover_w
    icon: "mdi:swap-horizontal"
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: gpio
    pin: GPIO16    # Relay 6 - Y changeover
    name: "Changeover Y"
    id: changeover_y
    icon: "mdi:swap-horizontal"
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: gpio
    pin: GPIO17    # Relay 7 - G changeover
    name: "Changeover G"
    id: changeover_g
    icon: "mdi:swap-horizontal"
    restore_mode: ALWAYS_OFF
    internal: true

  # --- Bypass (virtual switch - controls changeover relays as a group) ---

  - platform: template
    name: "Bypass"
    id: bypass_sw
    icon: "mdi:gate-open"
    restore_mode: ALWAYS_OFF
    optimistic: true
    turn_on_action:
      # Enter bypass: kill ESP32 control, de-energize changeover -> Pearl
      - switch.turn_off: heat_sw
      - switch.turn_off: cool_sw
      - switch.turn_off: fan_sw
      - switch.turn_off: uv_sw
      - switch.turn_off: changeover_w
      - switch.turn_off: changeover_y
      - switch.turn_off: changeover_g
      - output.turn_on: warning_led
    turn_off_action:
      # Exit bypass: energize changeover -> ESP32 in control
      - switch.turn_on: changeover_w
      - switch.turn_on: changeover_y
      - switch.turn_on: changeover_g
      - output.turn_off: warning_led

  - platform: restart
    name: "Restart"

# ---------------------------------------------------------------------------
# Onboard RGB LED (WS2812 on GPIO48)
# ---------------------------------------------------------------------------
light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    pin: GPIO48
    num_leds: 1
    rgb_order: GRB
    rmt_channel: 0
    name: "Status LED"
    id: status_led
    internal: true

# ---------------------------------------------------------------------------
# Warning LED
# ---------------------------------------------------------------------------
output:
  - platform: gpio
    pin: GPIO10
    id: warning_led

# ---------------------------------------------------------------------------
# Bypass button (GPIO0)
# ---------------------------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO11
      mode: INPUT_PULLUP
      inverted: true
    name: "Bypass Button"
    icon: "mdi:button-pointer"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - switch.toggle: bypass_sw

  - platform: status
    name: "Status"

# ---------------------------------------------------------------------------
# Environmental sensors
# ---------------------------------------------------------------------------
sensor:
  # Supply duct - BME280 at 0x76
  - platform: bme280_i2c
    address: 0x76
    update_interval: 30s
    temperature:
      name: "Supply Temperature"
      id: supply_temp
    humidity:
      name: "Supply Humidity"
      id: supply_hum
    pressure:
      name: "Supply Pressure"
      id: supply_pres

  # Return duct - BME680 at 0x77
  - platform: bme680
    address: 0x77
    update_interval: 30s
    temperature:
      name: "Return Temperature"
      id: return_temp
    humidity:
      name: "Return Humidity"
      id: return_hum
    pressure:
      name: "Return Pressure"
      id: return_pres
    gas_resistance:
      name: "Return VOC"
      id: return_voc
      filters:
        - multiply: 0.001  # Ohm -> kOhm

  # Computed: pressure delta (supply - return)
  - platform: template
    name: "Pressure Delta"
    id: pressure_delta
    unit_of_measurement: "hPa"
    icon: "mdi:gauge"
    lambda: |-
      if (id(supply_pres).has_state() && id(return_pres).has_state()) {
        return id(supply_pres).state - id(return_pres).state;
      }
      return {};
    update_interval: 30s

  # Diagnostics
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
  - platform: internal_temperature
    name: "ESP32 Temperature"
    update_interval: 60s

# ---------------------------------------------------------------------------
# Display - SSD1306 128x64 OLED
# ---------------------------------------------------------------------------
font:
  - file: "gfonts://Roboto"
    id: font1
    size: 12

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 5s
    lambda: |-
      if (id(display_page) == 0) {
        // Status screen
        it.printf(0, 0, id(font1), "HVAC Controller");
        it.printf(0, 14, id(font1), "HEAT:%s COOL:%s",
          id(heat_sw).state ? "ON" : "--",
          id(cool_sw).state ? "ON" : "--");
        it.printf(0, 28, id(font1), "FAN:%s  UV:%s",
          id(fan_sw).state ? "ON" : "--",
          id(uv_sw).state ? "ON" : "--");
        if (id(bypass_sw).state) {
          it.printf(0, 42, id(font1), "** BYPASS **");
        } else {
          it.printf(0, 42, id(font1), "Bypass: OFF");
        }
        it.printf(0, 54, id(font1), "IP: %s", id(ip_addr).state.c_str());
      } else {
        // Sensor screen
        if (id(supply_temp).has_state()) {
          it.printf(0, 0, id(font1), "Sup: %.1fF %.0f%%",
            id(supply_temp).state, id(supply_hum).state);
        } else {
          it.printf(0, 0, id(font1), "Sup: --");
        }
        if (id(return_temp).has_state()) {
          it.printf(0, 14, id(font1), "Ret: %.1fF %.0f%%",
            id(return_temp).state, id(return_hum).state);
        } else {
          it.printf(0, 14, id(font1), "Ret: --");
        }
        if (id(pressure_delta).has_state()) {
          it.printf(0, 28, id(font1), "dP: %.1f hPa", id(pressure_delta).state);
        }
        if (id(return_voc).has_state()) {
          it.printf(0, 42, id(font1), "VOC: %.1f kOhm", id(return_voc).state);
        }
      }

text_sensor:
  - platform: wifi_info
    ip_address:
      id: ip_addr
      name: "IP Address"

title: Kindle
views:
  - path: kindle
    type: panel
    cards:
      - type: vertical-stack
        cards:

          # ============ HEADER: CLOCK + DATE ============
          - type: custom:button-card
            entity: sun.sun
            show_state: false
            show_name: false
            show_icon: false
            tap_action: { action: none }
            triggers_update: all
            styles:
              card:
                - background: transparent
                - border: 2px solid "#000"
                - border-radius: 0
                - box-shadow: none
                - padding: 6px 16px
                - height: 80px
              grid:
                - grid-template-areas: '"time date"'
                - grid-template-columns: 1fr auto
                - align-items: center
              custom_fields:
                time:
                  - justify-self: start
                  - font-family: "'Roboto Mono', Menlo, monospace"
                  - font-size: 56px
                  - font-weight: 700
                  - line-height: 1
                  - color: "#000"
                  - letter-spacing: -2px
                date:
                  - justify-self: end
                  - font-family: "'Roboto Mono', Menlo, monospace"
                  - font-size: 18px
                  - font-weight: 700
                  - line-height: 1.2
                  - color: "#000"
                  - text-align: right
                  - letter-spacing: 2px
            custom_fields:
              time: |
                [[[
                  const d = new Date();
                  let h = d.getHours();
                  const m = ('0' + d.getMinutes()).slice(-2);
                  const ampm = h >= 12 ? 'PM' : 'AM';
                  h = h % 12; if (h === 0) h = 12;
                  return h + ':' + m + ' <span style="font-size:28px;">' + ampm + '</span>';
                ]]]
              date: |
                [[[
                  const d = new Date();
                  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
                  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
                  return days[d.getDay()] + '<br>' + months[d.getMonth()] + ' ' + d.getDate();
                ]]]

          # ============ HERO: Big outdoor temp + feels-like + condition + phrase ============
          - type: custom:button-card
            entity: weather.forecast_home
            show_state: false
            show_name: false
            show_icon: true
            size: 64px
            tap_action: { action: none }
            triggers_update: all
            styles:
              card:
                - background: transparent
                - border: 2px solid "#000"
                - border-top: none
                - border-radius: 0
                - box-shadow: none
                - padding: 8px 16px 8px 16px
                - height: 140px
              grid:
                - grid-template-areas: '"i temp phrase"'
                - grid-template-columns: 80px 1fr 1fr
                - align-items: center
                - column-gap: 12px
              icon:
                - width: 64px
                - height: 64px
                - color: "#000"
                - filter: grayscale(100%) brightness(0)
              img_cell:
                - justify-self: center
                - align-self: center
              custom_fields:
                temp:
                  - justify-self: start
                  - align-self: center
                  - font-family: "'Roboto Mono', Menlo, monospace"
                  - font-size: 80px
                  - font-weight: 700
                  - line-height: 0.9
                  - color: "#000"
                  - letter-spacing: -3px
                phrase:
                  - justify-self: end
                  - align-self: center
                  - font-family: Georgia, serif
                  - font-style: italic
                  - font-size: 15px
                  - line-height: 1.4
                  - color: "#000"
                  - text-align: right
                  - white-space: normal
            custom_fields:
              temp: |
                [[[
                  const t = parseFloat(states['sensor.weewx_outdoor_temperature'].state);
                  const rh = parseFloat(states['sensor.weewx_outdoor_humidity'].state);
                  const w = parseFloat(states['sensor.weewx_wind_speed_2'].state);
                  // Try met.no's apparent_temperature first (best value when available)
                  const at = states['weather.forecast_home'] && states['weather.forecast_home'].attributes
                    ? states['weather.forecast_home'].attributes.apparent_temperature : null;
                  let fl;
                  if (at !== null && at !== undefined && !isNaN(at)) {
                    fl = at;
                  } else if (t >= 80 && !isNaN(rh)) {
                    // NWS heat index (Steadman) — valid for T >= 80°F, any RH
                    fl = -42.379 + 2.04901523*t + 10.14333127*rh
                       - 0.22475541*t*rh - 6.83783e-3*t*t - 5.481717e-2*rh*rh
                       + 1.22874e-3*t*t*rh + 8.5282e-4*t*rh*rh - 1.99e-6*t*t*rh*rh;
                  } else if (t <= 50 && !isNaN(w) && w >= 3) {
                    // NWS wind chill — valid for T <= 50°F and wind >= 3 mph
                    const vp = Math.pow(w, 0.16);
                    fl = 35.74 + 0.6215*t - 35.75*vp + 0.4275*t*vp;
                  } else {
                    // No adjustment in the comfort zone — feels-like ≈ actual
                    fl = t;
                  }
                  const tStr = !isNaN(t) ? Math.round(t) + '°' : '--°';
                  // Only show "feels" line if it differs from actual by >= 2°F (otherwise noise)
                  const flStr = (!isNaN(fl) && Math.abs(fl - t) >= 2)
                    ? '<div style="font-size:22px;font-weight:700;letter-spacing:-1px;margin-top:4px;">feels ' + Math.round(fl) + '°</div>'
                    : '';
                  return tStr + flStr;
                ]]]
              phrase: |
                [[[
                  const t = parseFloat(states['sensor.weewx_outdoor_temperature'].state) || 0;
                  const d = parseFloat(states['sensor.weewx_dewpoint_3'].state) || 0;
                  const w = parseFloat(states['sensor.weewx_wind_speed_2'].state) || 0;
                  const cond = (states['weather.forecast_home'].state || '').replace(/-/g,' ');
                  const warmth = t < 40 ? 'Cold' : t < 60 ? 'Cool' : t < 75 ? 'Mild' : t < 85 ? 'Warm' : 'Hot';
                  const wet = d < 50 ? 'dry' : d < 60 ? 'comfortable' : d < 65 ? 'humid' : d < 70 ? 'sticky' : 'oppressive';
                  const wind = w < 2 ? 'calm' : w < 8 ? 'a light breeze' : w < 15 ? 'breezy' : w < 25 ? 'windy' : 'gusty';
                  const condTitle = cond.charAt(0).toUpperCase() + cond.slice(1);
                  return warmth + ' & ' + wet + ',<br>' + wind + '<br><span style="font-size:12px;letter-spacing:1px;font-style:normal;font-family:\'Roboto Mono\',monospace;font-weight:700;">' + condTitle.toUpperCase() + '</span>';
                ]]]

          # ============ 4-TILE STAT ROW: Wind | Humidity+Dewpoint | Pressure | Rain ============
          - type: grid
            columns: 4
            square: false
            cards:

              # WIND TILE — wind rose SVG + speed/gust
              - type: custom:button-card
                entity: sensor.weewx_wind_direction
                show_state: false
                show_name: false
                show_icon: false
                tap_action: { action: none }
                styles:
                  card:
                    - background: transparent
                    - border: 2px solid "#000"
                    - border-top: none
                    - border-right: none
                    - border-radius: 0
                    - box-shadow: none
                    - padding: 8px 6px
                    - height: 140px
                  grid:
                    - grid-template-areas: '"label" "rose" "speed"'
                    - grid-template-rows: 16px 1fr 30px
                    - align-items: center
                    - justify-items: center
                  custom_fields:
                    label:
                      - justify-self: start
                      - font-family: "'Roboto Mono', monospace"
                      - font-size: 10px
                      - font-weight: 700
                      - letter-spacing: 2px
                      - color: "#000"
                    rose:
                      - justify-self: center
                      - align-self: center
                    speed:
                      - justify-self: center
                      - font-family: "'Roboto Mono', monospace"
                      - font-size: 13px
                      - font-weight: 700
                      - color: "#000"
                      - letter-spacing: 1px
                      - text-align: center
                      - white-space: normal
                custom_fields:
                  label: WIND
                  rose: |
                    [[[
                      const dir = parseFloat(states['sensor.weewx_wind_direction'].state);
                      const angle = isNaN(dir) ? 0 : dir;
                      const ticks = [...Array(8)].map((_, i) => {
                        const a = i * 45 * Math.PI / 180;
                        const r1 = 26, r2 = 22;
                        const x1 = 30 + r1 * Math.sin(a), y1 = 30 - r1 * Math.cos(a);
                        const x2 = 30 + r2 * Math.sin(a), y2 = 30 - r2 * Math.cos(a);
                        return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#888" stroke-width="1"/>';
                      }).join('');
                      return '<svg width="70" height="70" viewBox="0 0 60 60">'
                        + '<circle cx="30" cy="30" r="27" fill="none" stroke="#888" stroke-width="1"/>'
                        + ticks
                        + '<text x="30" y="8" text-anchor="middle" font-size="7" font-weight="bold" fill="#000">N</text>'
                        + '<text x="56" y="33" text-anchor="middle" font-size="7" font-weight="bold" fill="#000">E</text>'
                        + '<text x="30" y="58" text-anchor="middle" font-size="7" font-weight="bold" fill="#000">S</text>'
                        + '<text x="4" y="33" text-anchor="middle" font-size="7" font-weight="bold" fill="#000">W</text>'
                        + '<g transform="rotate('+angle+' 30 30)">'
                        + '<polygon points="30,8 26,32 30,28 34,32" fill="#000"/>'
                        + '<circle cx="30" cy="30" r="2.5" fill="#000"/>'
                        + '</g></svg>';
                    ]]]
                  speed: |
                    [[[
                      const spd = parseFloat(states['sensor.weewx_wind_speed_2'].state) || 0;
                      const gust = parseFloat(states['sensor.weewx_wind_gust_2'].state) || 0;
                      const calm = isNaN(spd) || spd < 0.5;
                      if (calm) {
                        return 'CALM<br><span style="font-size:13px;font-weight:700;color:#000;">gust ' + Math.round(gust) + '</span>';
                      }
                      const dir = parseFloat(states['sensor.weewx_wind_direction'].state) || 0;
                      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
                      const card = dirs[Math.round(dir / 22.5) % 16];
                      return Math.round(spd) + ' MPH ' + card + '<br><span style="font-size:13px;font-weight:700;color:#000;">gust ' + Math.round(gust) + '</span>';
                    ]]]

              # HUMIDITY + DEWPOINT TILE
              - type: custom:button-card
                entity: sensor.weewx_outdoor_humidity
                show_state: false
                show_name: false
                show_icon: false
                tap_action: { action: none }
                styles:
                  card:
                    - background: transparent
                    - border: 2px solid "#000"
                    - border-top: none
                    - border-right: none
                    - border-radius: 0
                    - box-shadow: none
                    - padding: 8px 6px
                    - height: 140px
                  grid:
                    - grid-template-areas: '"label" "hum" "dew"'
                    - grid-template-rows: 16px 1fr 34px
                    - align-items: center
                    - justify-items: center
                  custom_fields:
                    label:
                      - justify-self: start
                      - font-family: "'Roboto Mono', monospace"
                      - font-size: 10px
                      - font-weight: 700
                      - letter-spacing: 2px
                      - color: "#000"
                    hum:
                      - justify-self: center
                      - align-self: center
                      - font-family: "'Roboto Mono', Menlo, monospace"
                      - font-size: 48px
                      - font-weight: 700
                      - line-height: 0.95
                      - color: "#000"
                      - letter-spacing: -2px
                    dew:
                      - justify-self: center
                      - font-family: "'Roboto Mono', monospace"
                      - font-size: 13px
                      - font-weight: 700
                      - color: "#000"
                      - text-align: center
                      - white-space: normal
                custom_fields:
                  label: HUMIDITY
                  hum: |
                    [[[
                      const h = parseFloat(states['sensor.weewx_outdoor_humidity'].state);
                      return !isNaN(h) ? Math.round(h) + '%' : '--';
                    ]]]
                  dew: |
                    [[[
                      const dp = parseFloat(states['sensor.weewx_dewpoint_3'].state);
                      return !isNaN(dp) ? 'DEW ' + Math.round(dp) + '°F' : '--';
                    ]]]

              # PRESSURE + TREND TILE
              - type: custom:button-card
                entity: sensor.weewx_barometer_2
                show_state: false
                show_name: false
                show_icon: false
                tap_action: { action: none }
                styles:
                  card:
                    - background: transparent
                    - border: 2px solid "#000"
                    - border-top: none
                    - border-right: none
                    - border-radius: 0
                    - box-shadow: none
                    - padding: 8px 6px
                    - height: 140px
                  grid:
                    - grid-template-areas: '"label" "pres" "trend"'
                    - grid-template-rows: 16px 1fr 34px
                    - align-items: center
                    - justify-items: center
                  custom_fields:
                    label:
                      - justify-self: start
                      - font-family: "'Roboto Mono', monospace"
                      - font-size: 10px
                      - font-weight: 700
                      - letter-spacing: 2px
                      - color: "#000"
                    pres:
                      - justify-self: center
                      - align-self: center
                      - font-family: "'Roboto Mono', Menlo, monospace"
                      - font-size: 34px
                      - font-weight: 700
                      - line-height: 1
                      - color: "#000"
                      - letter-spacing: -1px
                    trend:
                      - justify-self: center
                      - font-family: "'Roboto Mono', monospace"
                      - font-size: 12px
                      - font-weight: 700
                      - color: "#000"
                      - text-align: center
                      - white-space: normal
                custom_fields:
                  label: PRESSURE
                  pres: |
                    [[[
                      const p = parseFloat(states['sensor.weewx_barometer_2'].state);
                      return !isNaN(p) ? p.toFixed(2) : '--';
                    ]]]
                  trend: |
                    [[[
                      const t = parseFloat(states['sensor.weewx_barometer_trend_3h'].state) || 0;
                      const arrow = t > 0.06 ? '▲▲' : t > 0.02 ? '▲' : t < -0.06 ? '▼▼' : t < -0.02 ? '▼' : '→';
                      const word = t > 0.06 ? 'Rising fast' : t > 0.02 ? 'Rising' : t < -0.06 ? 'Falling fast' : t < -0.02 ? 'Falling' : 'Steady';
                      return arrow + ' ' + word;
                    ]]]

              # RAINFALL TILE
              - type: custom:button-card
                entity: sensor.weewx_rain_today
                show_state: false
                show_name: false
                show_icon: false
                tap_action: { action: none }
                styles:
                  card:
                    - background: transparent
                    - border: 2px solid "#000"
                    - border-top: none
                    - border-radius: 0
                    - box-shadow: none
                    - padding: 8px 6px
                    - height: 140px
                  grid:
                    - grid-template-areas: '"label" "rain" "rate"'
                    - grid-template-rows: 16px 1fr 34px
                    - align-items: center
                    - justify-items: center
                  custom_fields:
                    label:
                      - justify-self: start
                      - font-family: "'Roboto Mono', monospace"
                      - font-size: 10px
                      - font-weight: 700
                      - letter-spacing: 2px
                      - color: "#000"
                    rain:
                      - justify-self: center
                      - align-self: center
                      - font-family: "'Roboto Mono', Menlo, monospace"
                      - font-size: 48px
                      - font-weight: 700
                      - line-height: 0.95
                      - color: "#000"
                      - letter-spacing: -2px
                    rate:
                      - justify-self: center
                      - font-family: "'Roboto Mono', monospace"
                      - font-size: 11px
                      - font-weight: 700
                      - color: "#000"
                      - text-align: center
                      - white-space: normal
                custom_fields:
                  label: RAINFALL
                  rain: |
                    [[[
                      const r = parseFloat(states['sensor.weewx_rain_today'].state);
                      return !isNaN(r) ? r.toFixed(2) + '"' : '--';
                    ]]]
                  rate: |
                    [[[
                      const r = parseFloat(states['sensor.weewx_rain_rate_2'].state) || 0;
                      if (r === 0) return 'NONE FALLING';
                      if (r < 0.1) return 'LIGHT ' + r.toFixed(2) + '"/h';
                      if (r < 0.3) return 'MOD ' + r.toFixed(2) + '"/h';
                      return 'HEAVY ' + r.toFixed(2) + '"/h';
                    ]]]

          # ============ INDOOR + WINDOW SUGGESTION ============
          - type: grid
            columns: 2
            square: false
            cards:

              # INDOOR temp/humidity
              - type: custom:button-card
                entity: sensor.ecowitt_indoor_temperature
                show_state: false
                show_name: false
                show_icon: false
                tap_action: { action: none }
                styles:
                  card:
                    - background: transparent
                    - border: 2px solid "#000"
                    - border-top: none
                    - border-right: none
                    - border-radius: 0
                    - box-shadow: none
                    - padding: 6px 12px
                    - height: 80px
                  grid:
                    - grid-template-areas: '"label" "vals"'
                    - grid-template-rows: 16px 1fr
                    - align-items: center
                  custom_fields:
                    label:
                      - justify-self: start
                      - font-family: "'Roboto Mono', monospace"
                      - font-size: 10px
                      - font-weight: 700
                      - letter-spacing: 2px
                      - color: "#000"
                    vals:
                      - justify-self: start
                      - align-self: center
                      - font-family: "'Roboto Mono', Menlo, monospace"
                      - font-size: 26px
                      - font-weight: 700
                      - line-height: 1
                      - color: "#000"
                      - white-space: normal
                custom_fields:
                  label: INDOOR
                  vals: |
                    [[[
                      const t = parseFloat(states['sensor.ecowitt_indoor_temperature'].state);
                      const rh = parseFloat(states['sensor.ecowitt_indoor_humidity'].state);
                      const tStr = !isNaN(t) ? t.toFixed(1) + '°F' : '--°';
                      const rhStr = !isNaN(rh) ? Math.round(rh) + '% RH' : '--%';
                      return tStr + ' · ' + rhStr;
                    ]]]

              # WINDOW SUGGESTION — dewpoint Magnus formula
              - type: custom:button-card
                entity: sensor.weewx_outdoor_temperature
                show_state: false
                show_name: false
                show_icon: false
                tap_action: { action: none }
                styles:
                  card:
                    - background: transparent
                    - border: 2px solid "#000"
                    - border-top: none
                    - border-radius: 0
                    - box-shadow: none
                    - padding: 6px 12px
                    - height: 80px
                  grid:
                    - grid-template-areas: '"label" "suggest"'
                    - grid-template-rows: 16px 1fr
                    - align-items: center
                  custom_fields:
                    label:
                      - justify-self: start
                      - font-family: "'Roboto Mono', monospace"
                      - font-size: 10px
                      - font-weight: 700
                      - letter-spacing: 2px
                      - color: "#000"
                    suggest:
                      - justify-self: start
                      - align-self: center
                      - font-family: Georgia, serif
                      - font-style: italic
                      - font-size: 18px
                      - font-weight: 400
                      - line-height: 1.1
                      - color: "#000"
                      - white-space: normal
                custom_fields:
                  label: WINDOWS
                  suggest: |
                    [[[
                      const o_t  = parseFloat(states['sensor.weewx_outdoor_temperature'].state) || 0;
                      const i_t  = parseFloat(states['sensor.ecowitt_indoor_temperature'].state) || 70;
                      const o_dp = parseFloat(states['sensor.weewx_dewpoint_3'].state) || 0;
                      const i_rh = parseFloat(states['sensor.ecowitt_indoor_humidity'].state) || 50;
                      const o_rh = parseFloat(states['sensor.weewx_outdoor_humidity'].state) || 0;
                      const i_tc = (i_t - 32) * 5 / 9;
                      const a = 17.27, b = 237.7;
                      const alpha = (a * i_tc) / (b + i_tc) + Math.log(i_rh / 100);
                      const i_dp = (b * alpha) / (a - alpha) * 9 / 5 + 32;
                      const dp_diff = o_dp - i_dp;
                      const favorable = dp_diff < -3 && o_t < i_t && o_rh < 75;
                      const humid_closed = dp_diff > 2 || o_rh > 80;
                      const mode = states['input_select.hvac_mode'] ? states['input_select.hvac_mode'].state : 'OFF';
                      let text, color;
                      if (mode === 'COOL') {
                        if (favorable) { text = 'Open the windows — let the AC rest'; color = 'green'; }
                        else           { text = 'Keep closed — AC running';            color = 'red';   }
                      } else if (mode === 'HEAT') {
                        text = 'Keep closed — heat running'; color = 'red';
                      } else {
                        if (favorable)         { text = 'Open the windows';              color = 'green'; }
                        else if (humid_closed) { text = 'Keep windows closed';           color = 'red';   }
                        else if (o_t < i_t)   { text = 'Cool but humid — judgment call'; color = '#555'; }
                        else                  { text = 'No comfort gain';                color = '#555'; }
                      }
                      const hvacSuffix = mode === 'COOL' ? ' · AC cooling' : (mode === 'HEAT' ? ' · heat on' : ' · HVAC off');
                      const detail = 'DP out ' + Math.round(o_dp) + '° vs in ' + Math.round(i_dp) + '° · ' + (o_t - i_t >= 0 ? '+' : '') + (o_t - i_t).toFixed(1) + '°F' + hvacSuffix;
                      return '<span style="color:' + color + '">' + text + '</span><br><span style="font-size:11px;font-style:normal;color:#555">' + detail + '</span>';
                    ]]]

          # ============ 5-DAY FORECAST ============
          - type: weather-forecast
            entity: weather.forecast_home
            forecast_type: daily
            show_current: false
            show_forecast: true
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  border: 2px solid #000 !important;
                  border-top: none !important;
                  border-radius: 0 !important;
                  box-shadow: none !important;
                  padding: 6px 10px 8px 10px !important;
                  font-family: 'Roboto Mono', Menlo, monospace !important;
                  height: 160px !important;
                  overflow: hidden !important;
                }
                ha-card::before {
                  content: "5-DAY FORECAST";
                  display: block;
                  font-family: 'Roboto Mono', monospace;
                  font-size: 10px;
                  font-weight: 700;
                  letter-spacing: 2px;
                  color: #000;
                  padding-bottom: 4px;
                }
                .forecast > div:nth-child(n+6) { display: none !important; }
                .forecast {
                  justify-content: space-around !important;
                  align-items: center !important;
                  gap: 2px !important;
                }
                .forecast > div {
                  font-family: 'Roboto Mono', Menlo, monospace !important;
                  padding: 1px 3px !important;
                }
                /* Aggressive: force EVERY descendant text to bold black Roboto Mono.
                   HA's weather-forecast card uses several class names depending on version
                   (.name, .day-text, .forecast-name, plain divs) — this catches all. */
                .forecast,
                .forecast *,
                .forecast > div,
                .forecast > div *,
                div[part="forecast"] *,
                .day,
                .day *,
                .day-text,
                .name,
                .temp,
                .highTemp,
                .templow,
                .temperature,
                .secondary {
                  font-family: 'Roboto Mono', Menlo, monospace !important;
                  color: #000 !important;
                  font-weight: 700 !important;
                  text-shadow: 0 0 0 #000 !important;
                }
                .name, .day-text, .forecast > div > :first-child {
                  font-size: 14px !important;
                  letter-spacing: 1px !important;
                  margin-bottom: 2px !important;
                  text-transform: uppercase !important;
                }
                .temp, .highTemp {
                  font-size: 22px !important;
                  line-height: 1 !important;
                  margin-top: 2px !important;
                }
                .templow {
                  font-size: 17px !important;
                }
                .icon {
                  filter: grayscale(100%) brightness(0);
                  width: 42px !important;
                  height: 42px !important;
                  margin: 2px 0 !important;
                }

          # ============ 48h BAROMETER — text panel (sibbl puppeteer doesn't render chart x-axis) ============
          - type: custom:button-card
            entity: sensor.weewx_barometer_2
            show_state: false
            show_name: false
            show_icon: false
            tap_action: { action: none }
            triggers_update: all
            styles:
              card:
                - background: transparent
                - border: 2px solid "#000"
                - border-top: none
                - border-radius: 0
                - box-shadow: none
                - padding: 6px 16px
                - height: 200px
              grid:
                - grid-template-areas: '"title" "now" "trend" "range"'
                - grid-template-rows: auto auto auto auto
                - align-content: start
                - row-gap: 4px
              custom_fields:
                title:
                  - justify-self: start
                  - align-self: start
                  - font-family: "'Roboto Mono', monospace"
                  - font-size: 11px
                  - font-weight: 700
                  - letter-spacing: 2px
                  - color: "#000"
                now:
                  - justify-self: start
                  - align-self: start
                  - font-family: "'Roboto Mono', Menlo, monospace"
                  - font-weight: 700
                  - color: "#000"
                trend:
                  - justify-self: start
                  - align-self: start
                  - font-family: "'Roboto Mono', monospace"
                  - font-weight: 700
                  - color: "#000"
                range:
                  - justify-self: start
                  - align-self: start
                  - font-family: "'Roboto Mono', monospace"
                  - font-weight: 700
                  - color: "#000"
            custom_fields:
              title: "BAROMETER · 48H"
              now: |
                [[[
                  const v = parseFloat(states['sensor.weewx_barometer_2'].state);
                  const vStr = !isNaN(v) ? v.toFixed(2) : '--';
                  return '<span style="font-size:46px;letter-spacing:-2px;">' + vStr + '</span><span style="font-size:18px;margin-left:8px;letter-spacing:1px;">inHg</span>';
                ]]]
              trend: |
                [[[
                  const t = parseFloat(states['sensor.weewx_barometer_trend_3h'].state) || 0;
                  let arrow, word;
                  if (t >  0.06) { arrow = '▲▲'; word = 'Rising fast'; }
                  else if (t >  0.02) { arrow = '▲'; word = 'Rising'; }
                  else if (t < -0.06) { arrow = '▼▼'; word = 'Falling fast'; }
                  else if (t < -0.02) { arrow = '▼'; word = 'Falling'; }
                  else { arrow = '→'; word = 'Steady'; }
                  const sign = t >= 0 ? '+' : '';
                  return '<span style="font-size:24px;">' + arrow + ' ' + word + '</span>' +
                         '<span style="font-size:14px;color:#555;margin-left:10px;">' +
                         sign + t.toFixed(3) + ' inHg/3h</span>';
                ]]]
              range: |
                [[[
                  const lo = states['sensor.barometer_48h_min'];
                  const hi = states['sensor.barometer_48h_max'];
                  const mn = states['sensor.barometer_48h_mean'];
                  const loV = lo && lo.state !== 'unavailable' && lo.state !== 'unknown' ? parseFloat(lo.state).toFixed(2) : '--';
                  const hiV = hi && hi.state !== 'unavailable' && hi.state !== 'unknown' ? parseFloat(hi.state).toFixed(2) : '--';
                  const mnV = mn && mn.state !== 'unavailable' && mn.state !== 'unknown' ? parseFloat(mn.state).toFixed(2) : '--';
                  return '<div style="font-size:14px;color:#555;letter-spacing:1px;">48H RANGE</div>' +
                         '<div style="font-size:20px;margin-top:2px;">' + loV + ' — ' + hiV +
                         '<span style="font-size:14px;color:#555;margin-left:12px;">avg ' + mnV + '</span></div>';
                ]]]

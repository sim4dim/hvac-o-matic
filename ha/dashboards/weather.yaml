title: Weather
views:
  - title: Now
    path: now
    icon: mdi:weather-partly-cloudy
    type: panel
    cards:
      - type: vertical-stack
        cards:

          # ============================================================
          # ROW 1: HERO + chip strip (one unified panel, full width)
          # ============================================================
          - type: custom:stack-in-card
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {{ states('sensor.weewx_outdoor_temperature') | round(0) }}°F · feels {{
                  iif(state_attr('weather.forecast_home','apparent_temperature') is not none,
                      state_attr('weather.forecast_home','apparent_temperature') | round(0),
                      states('sensor.weewx_dewpoint_3') | round(0)) }}°
                secondary: >-
                  {% set t = states('sensor.weewx_outdoor_temperature') | float(0) %}
                  {% set d = states('sensor.weewx_dewpoint_3') | float(0) %}
                  {% set w = states('sensor.weewx_wind_speed_2') | float(0) %}
                  {% set cond = states('weather.forecast_home') %}
                  {% set warmth = 'Cold' if t < 40 else 'Cool' if t < 60 else 'Mild' if t < 75 else 'Warm' if t < 85 else 'Hot' %}
                  {% set wet = 'dry' if d < 50 else 'comfortable' if d < 60 else 'humid' if d < 65 else 'sticky' if d < 70 else 'oppressive' %}
                  {% set wind = 'calm' if w < 2 else 'a light breeze' if w < 8 else 'breezy' if w < 15 else 'windy' if w < 25 else 'gusty' %}
                  {{ warmth }} & {{ wet }}, {{ wind }} · {{ cond | replace('-',' ') | title }}
                icon: >-
                  {% set m = {'clear-night':'mdi:weather-night','cloudy':'mdi:weather-cloudy','exceptional':'mdi:weather-tornado','fog':'mdi:weather-fog','hail':'mdi:weather-hail','lightning':'mdi:weather-lightning','lightning-rainy':'mdi:weather-lightning-rainy','partlycloudy':'mdi:weather-partly-cloudy','pouring':'mdi:weather-pouring','rainy':'mdi:weather-rainy','snowy':'mdi:weather-snowy','snowy-rainy':'mdi:weather-snowy-rainy','sunny':'mdi:weather-sunny','windy':'mdi:weather-windy','windy-variant':'mdi:weather-windy-variant'} %}
                  {{ m.get(states('weather.forecast_home'), 'mdi:weather-partly-cloudy') }}
                icon_color: >-
                  {% set t = states('sensor.weewx_outdoor_temperature') | float(0) %}
                  {{ 'blue' if t < 40 else 'light-blue' if t < 60 else 'green' if t < 75 else 'amber' if t < 85 else 'red' }}
                tap_action:
                  action: more-info
                  entity: weather.forecast_home
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    icon: mdi:water-percent
                    content: "{{ states('sensor.weewx_outdoor_humidity') | round(0) }}%"
                    icon_color: blue
                  - type: template
                    icon: mdi:weather-sunny
                    content: "UV {{ state_attr('weather.forecast_home','uv_index') | default('—') }}"
                    icon_color: >-
                      {% set uv = state_attr('weather.forecast_home','uv_index') | float(0) %}
                      {{ 'green' if uv < 3 else 'amber' if uv < 6 else 'orange' if uv < 8 else 'red' if uv < 11 else 'purple' }}
                  - type: template
                    icon: mdi:cloud
                    content: "{{ state_attr('weather.forecast_home','cloud_coverage') | round(0) }}%"
                    icon_color: grey
                  - type: template
                    icon: mdi:thermometer-water
                    content: "Dew {{ states('sensor.weewx_dewpoint_3') | round(0) }}°"
                    icon_color: teal

          # ============================================================
          # ROW 2: FOUR equal-prominence outdoor stat tiles
          #         Wind | Temp/RH | Barometer trend | Rainfall
          # ============================================================
          - type: horizontal-stack
            cards:

              # --- Wind tile (small rose on left, speed/gust on right) ---
              - type: custom:button-card
                entity: sensor.weewx_wind_direction
                show_name: false
                show_state: false
                show_icon: false
                show_label: true
                label: |
                  [[[
                    const dir = parseFloat(states['sensor.weewx_wind_direction'].state);
                    const spd = parseFloat(states['sensor.weewx_wind_speed_2'].state);
                    const gust = parseFloat(states['sensor.weewx_wind_gust_2'].state);
                    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
                    const calm = isNaN(spd) || spd < 0.5;
                    const card = calm ? 'calm' : (isNaN(dir) ? '—' : dirs[Math.round(dir/22.5) % 16]);
                    const spdStr = calm ? '0.0' : spd.toFixed(1);
                    return `<div style="font-size:17px;font-weight:600;line-height:1.2;color:var(--primary-text-color);">${spdStr} mph ${card}</div><div style="font-size:13px;color:var(--secondary-text-color);margin-top:2px;">gust ${gust.toFixed(1)} mph</div>`;
                  ]]]
                styles:
                  card:
                    - padding: 12px 16px
                    - background: var(--ha-card-background)
                    - box-shadow: var(--ha-card-box-shadow)
                    - border-radius: var(--ha-card-border-radius, 12px)
                    - height: 88px
                  grid:
                    - grid-template-columns: 64px 1fr
                    - grid-template-areas: '"rose label"'
                    - gap: 12px
                    - align-items: center
                  custom_fields:
                    rose:
                      - grid-area: rose
                      - display: flex
                      - align-items: center
                      - justify-content: center
                  label:
                    - grid-area: label
                    - margin: 0
                    - white-space: normal
                    - text-align: left
                custom_fields:
                  rose: |
                    [[[
                      const dir = parseFloat(states['sensor.weewx_wind_direction'].state);
                      const angle = isNaN(dir) ? 0 : dir;
                      const ticks = [...Array(8)].map((_, i) => {
                        const a = i * 45 * Math.PI / 180;
                        const r1 = 28, r2 = 24;
                        const x1 = 32 + r1 * Math.sin(a), y1 = 32 - r1 * Math.cos(a);
                        const x2 = 32 + r2 * Math.sin(a), y2 = 32 - r2 * Math.cos(a);
                        return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--divider-color)" stroke-width="1"/>`;
                      }).join('');
                      return `<svg width="64" height="64" viewBox="0 0 64 64">
                        <circle cx="32" cy="32" r="29" fill="none" stroke="var(--divider-color)" stroke-width="1.2"/>
                        ${ticks}
                        <text x="32" y="9"  text-anchor="middle" font-size="8" font-weight="bold" fill="var(--primary-text-color)">N</text>
                        <text x="60" y="35" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--primary-text-color)">E</text>
                        <text x="32" y="61" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--primary-text-color)">S</text>
                        <text x="4"  y="35" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--primary-text-color)">W</text>
                        <g transform="rotate(${angle} 32 32)" style="transition: transform 1s ease;">
                          <polygon points="32,10 27,36 32,31 37,36" fill="var(--primary-color)"/>
                          <circle cx="32" cy="32" r="2.5" fill="var(--primary-color)"/>
                        </g>
                      </svg>`;
                    ]]]

              # --- Outdoor Temp / Humidity tile ---
              - type: custom:mushroom-template-card
                primary: >-
                  {{ states('sensor.weewx_outdoor_temperature') | round(1) }}°F · {{ states('sensor.weewx_outdoor_humidity') | round(0) }}% RH
                secondary: >-
                  {% set t = states('sensor.weewx_outdoor_temperature') | float(0) %}
                  {% set d = states('sensor.weewx_dewpoint_3') | float(0) %}
                  {% set warmth = 'Cold' if t < 40 else 'Cool' if t < 60 else 'Mild' if t < 75 else 'Warm' if t < 85 else 'Hot' %}
                  {% set wet = 'dry' if d < 50 else 'comfortable' if d < 60 else 'humid' if d < 65 else 'sticky' if d < 70 else 'oppressive' %}
                  {{ warmth }} & {{ wet }} · dew {{ d | round(0) }}°
                icon: mdi:thermometer
                icon_color: >-
                  {% set t = states('sensor.weewx_outdoor_temperature') | float(0) %}
                  {{ 'blue' if t < 40 else 'light-blue' if t < 60 else 'green' if t < 75 else 'amber' if t < 85 else 'red' }}

              # --- Barometer + trend tile ---
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.weewx_barometer_2') }} inHg"
                secondary: >-
                  {% set t = states('sensor.weewx_barometer_trend_3h') | float(0) %}
                  {% set arrow = '▲▲' if t > 0.06 else '▲' if t > 0.02 else '▼▼' if t < -0.06 else '▼' if t < -0.02 else '→' %}
                  {% set word = 'Rising fast' if t > 0.06 else 'Rising' if t > 0.02 else 'Falling fast' if t < -0.06 else 'Falling' if t < -0.02 else 'Steady' %}
                  {{ arrow }} {{ word }} ({{ '%+0.3f' % t }} / 3h)
                icon: mdi:gauge
                icon_color: >-
                  {% set t = states('sensor.weewx_barometer_trend_3h') | float(0) %}
                  {{ 'red' if t < -0.06 else 'orange' if t < -0.02 else 'green' if t > 0.02 else 'grey' }}

              # --- Rainfall tile ---
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.weewx_rain_today') }} in today"
                secondary: >-
                  {% set r = states('sensor.weewx_rain_rate_2') | float(0) %}
                  {% set w = states('sensor.rain_this_week') | float(0) %}
                  {% set m = states('sensor.rain_this_month') | float(0) %}
                  {% if r == 0 %}No rain · {{ '%.2f'|format(w) }} in wk · {{ '%.2f'|format(m) }} in mo{% elif r < 0.1 %}Light · {{ r }} in/h · {{ '%.2f'|format(w) }} wk · {{ '%.2f'|format(m) }} mo{% elif r < 0.3 %}Moderate · {{ r }} in/h · {{ '%.2f'|format(w) }} wk · {{ '%.2f'|format(m) }} mo{% else %}Heavy · {{ r }} in/h · {{ '%.2f'|format(w) }} wk · {{ '%.2f'|format(m) }} mo{% endif %}
                icon: mdi:weather-rainy
                icon_color: >-
                  {% set r = states('sensor.weewx_rain_rate_2') | float(0) %}
                  {{ 'blue' if r > 0 else 'grey' }}

          # ============================================================
          # ROW 3: Indoor reading + window suggestion
          # ============================================================
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  Indoor {{ states('sensor.ecowitt_indoor_temperature') | round(1) }}°F · {{ states('sensor.ecowitt_indoor_humidity') | round(0) }}% RH
                secondary: >-
                  {% set i_t = states('sensor.ecowitt_indoor_temperature') | float(0) %}
                  {% set i_rh = states('sensor.ecowitt_indoor_humidity') | float(50) %}
                  {% set i_tc = (i_t - 32) * 5 / 9 %}
                  {% set alpha = (17.27 * i_tc) / (237.7 + i_tc) + (i_rh / 100) | log %}
                  {% set i_dp = ((237.7 * alpha) / (17.27 - alpha)) * 9 / 5 + 32 %}
                  {% set rooms = [
                    {'n':'Ben',    't': states('sensor.gw1000_temp_ch7')|float(none)},
                    {'n':'Gene',   't': states('sensor.gw1000_temp_ch6')|float(none)},
                    {'n':'MBR',    't': states('sensor.gw1000_temp_ch4')|float(none)},
                    {'n':'1st Fl', 't': states('sensor.gw1000_indoor_temperature')|float(none)}
                  ] | selectattr('t','!=',none) | list %}
                  {% set hot = rooms | sort(attribute='t') | last %}
                  {% set cold = rooms | sort(attribute='t') | first %}
                  Dewpoint {{ i_dp|round(0) }}° · ↑ {{ hot.n }} {{ hot.t|round(0) }}° · ↓ {{ cold.n }} {{ cold.t|round(0) }}°
                icon: mdi:home
                icon_color: amber
              - type: custom:mushroom-template-card
                primary: >-
                  {% set o_t  = states('sensor.weewx_outdoor_temperature') | float(0) %}
                  {% set o_dp = states('sensor.weewx_dewpoint_3') | float(0) %}
                  {% set o_rh = states('sensor.weewx_outdoor_humidity') | float(0) %}
                  {# Pick the hottest conditioned room; use its temp+RH for indoor dewpoint #}
                  {% set rooms = [
                    {'n':'Ben',    't': states('sensor.gw1000_temp_ch7')|float(-99),          'h': states('sensor.gw1000_humidity_ch7')|float(50)},
                    {'n':'Gene',   't': states('sensor.gw1000_temp_ch6')|float(-99),          'h': states('sensor.gw1000_humidity_ch6')|float(50)},
                    {'n':'MBR',    't': states('sensor.gw1000_temp_ch4')|float(-99),          'h': states('sensor.gw1000_humidity_ch4')|float(50)},
                    {'n':'1st Fl', 't': states('sensor.gw1000_indoor_temperature')|float(-99),'h': states('sensor.gw1000_indoor_humidity')|float(50)}
                  ] %}
                  {% set hottest = rooms | sort(attribute='t') | last %}
                  {% set i_t  = hottest.t %}
                  {% set i_rh = hottest.h %}
                  {# Gate on the REAL keenect HVAC state, not per-room setpoints #}
                  {% set ks    = states('sensor.keenect_status') %}
                  {% set ks_on = state_attr('sensor.keenect_status','hvac_on') %}
                  {% set mode  = states('input_select.hvac_mode') %}
                  {% set cooling_running = (ks == 'COOLING') or (ks_on == true and mode == 'COOL') %}
                  {% set heating_running = (ks == 'HEATING') or (ks_on == true and mode == 'HEAT') %}
                  {# Indoor dewpoint via Magnus-formula approximation in °F #}
                  {% set i_tc = (i_t - 32) * 5 / 9 %}
                  {% set a = 17.27 %}
                  {% set b = 237.7 %}
                  {% set alpha = (a * i_tc) / (b + i_tc) + (i_rh / 100) | log %}
                  {% set i_dp = (b * alpha) / (a - alpha) * 9 / 5 + 32 %}
                  {% set dp_diff = o_dp - i_dp %}
                  {% set favorable = dp_diff < -3 and o_t < i_t and o_rh < 75 %}
                  {% set humid = dp_diff > 2 or o_rh > 80 %}
                  {% if mode == 'COOL' %}
                    {% if cooling_running %}
                      {% if favorable %}Open windows — skip the AC
                      {%- elif humid %}Run the AC — too humid out
                      {%- elif o_t >= i_t %}Run the AC — warmer out
                      {%- else %}Cool but humid — judgment call
                      {%- endif %}
                    {%- else %}
                      {% if favorable %}Open for fresh air
                      {%- elif humid or o_t >= i_t %}Keep closed — already comfortable
                      {%- else %}Comfortable — windows optional
                      {%- endif %}
                    {%- endif %}
                  {%- elif mode == 'HEAT' %}Keep closed — heating
                  {%- else %}
                    {% if favorable %}Open the windows
                    {%- elif humid %}Keep windows closed
                    {%- elif o_t < i_t %}Cool but humid — judgment call
                    {%- else %}No comfort gain
                    {%- endif %}
                  {%- endif %}
                secondary: >-
                  {% set o_t  = states('sensor.weewx_outdoor_temperature') | float(0) %}
                  {% set o_dp = states('sensor.weewx_dewpoint_3') | float(0) %}
                  {% set rooms = [
                    {'n':'Ben',    't': states('sensor.gw1000_temp_ch7')|float(-99),          'h': states('sensor.gw1000_humidity_ch7')|float(50)},
                    {'n':'Gene',   't': states('sensor.gw1000_temp_ch6')|float(-99),          'h': states('sensor.gw1000_humidity_ch6')|float(50)},
                    {'n':'MBR',    't': states('sensor.gw1000_temp_ch4')|float(-99),          'h': states('sensor.gw1000_humidity_ch4')|float(50)},
                    {'n':'1st Fl', 't': states('sensor.gw1000_indoor_temperature')|float(-99),'h': states('sensor.gw1000_indoor_humidity')|float(50)}
                  ] %}
                  {% set hottest = rooms | sort(attribute='t') | last %}
                  {% set i_t  = hottest.t %}
                  {% set i_rh = hottest.h %}
                  {% set ks    = states('sensor.keenect_status') %}
                  {% set ks_on = state_attr('sensor.keenect_status','hvac_on') %}
                  {% set mode  = states('input_select.hvac_mode') %}
                  {% set cooling_running = (ks == 'COOLING') or (ks_on == true and mode == 'COOL') %}
                  {% set heating_running = (ks == 'HEATING') or (ks_on == true and mode == 'HEAT') %}
                  {% set i_tc = (i_t - 32) * 5 / 9 %}
                  {% set alpha = (17.27 * i_tc) / (237.7 + i_tc) + (i_rh / 100) | log %}
                  {% set i_dp = ((237.7 * alpha) / (17.27 - alpha)) * 9 / 5 + 32 %}
                  {% if cooling_running %}{% set hvac_label = 'AC cooling' %}
                  {%- elif mode == 'COOL' %}{% set hvac_label = 'AC idle' %}
                  {%- elif heating_running %}{% set hvac_label = 'heat on' %}
                  {%- else %}{% set hvac_label = 'HVAC off' %}
                  {%- endif %}
                  Hottest {{ hottest.n }} {{ i_t | round(0) }}° · DP {{ o_dp | round(0) }}/{{ i_dp | round(0) }}° · {{ hvac_label }}
                icon: mdi:window-open-variant
                icon_color: >-
                  {% set o_t  = states('sensor.weewx_outdoor_temperature') | float(0) %}
                  {% set o_dp = states('sensor.weewx_dewpoint_3') | float(0) %}
                  {% set o_rh = states('sensor.weewx_outdoor_humidity') | float(0) %}
                  {% set rooms = [
                    {'n':'Ben',    't': states('sensor.gw1000_temp_ch7')|float(-99),          'h': states('sensor.gw1000_humidity_ch7')|float(50)},
                    {'n':'Gene',   't': states('sensor.gw1000_temp_ch6')|float(-99),          'h': states('sensor.gw1000_humidity_ch6')|float(50)},
                    {'n':'MBR',    't': states('sensor.gw1000_temp_ch4')|float(-99),          'h': states('sensor.gw1000_humidity_ch4')|float(50)},
                    {'n':'1st Fl', 't': states('sensor.gw1000_indoor_temperature')|float(-99),'h': states('sensor.gw1000_indoor_humidity')|float(50)}
                  ] %}
                  {% set hottest = rooms | sort(attribute='t') | last %}
                  {% set i_t  = hottest.t %}
                  {% set i_rh = hottest.h %}
                  {% set ks    = states('sensor.keenect_status') %}
                  {% set ks_on = state_attr('sensor.keenect_status','hvac_on') %}
                  {% set mode  = states('input_select.hvac_mode') %}
                  {% set cooling_running = (ks == 'COOLING') or (ks_on == true and mode == 'COOL') %}
                  {% set i_tc = (i_t - 32) * 5 / 9 %}
                  {% set alpha = (17.27 * i_tc) / (237.7 + i_tc) + (i_rh / 100) | log %}
                  {% set i_dp = ((237.7 * alpha) / (17.27 - alpha)) * 9 / 5 + 32 %}
                  {% set dp_diff = o_dp - i_dp %}
                  {% set favorable = dp_diff < -3 and o_t < i_t and o_rh < 75 %}
                  {% set humid = dp_diff > 2 or o_rh > 80 %}
                  {% if mode == 'COOL' %}
                    {% if cooling_running %}
                      {% if favorable %}green
                      {%- elif humid %}red
                      {%- elif o_t >= i_t %}red
                      {%- else %}grey
                      {%- endif %}
                    {%- else %}
                      {% if favorable %}green{%- else %}grey{% endif %}
                    {%- endif %}
                  {%- elif mode == 'HEAT' %}red
                  {%- else %}
                    {% if favorable %}green
                    {%- elif humid %}red
                    {%- else %}grey
                    {%- endif %}
                  {%- endif %}

          # ============================================================
          # ROW 3: FORECAST  (full width)
          # ============================================================
          - type: custom:stack-in-card
            cards:
              - type: weather-forecast
                entity: weather.forecast_home
                forecast_type: daily
                show_current: false
                show_forecast: true

          # ============================================================
          # ROW 4: 24h TRENDS — two charts side-by-side
          # ============================================================
          - type: horizontal-stack
            cards:
              - type: custom:apexcharts-card
                header:
                  show: true
                  title: Temperature & Humidity (24h)
                  show_states: true
                  colorize_states: true
                graph_span: 24h
                span:
                  end: minute
                apex_config:
                  chart:
                    height: 280
                  legend:
                    position: bottom
                yaxis:
                  - id: temp
                    decimals: 0
                    apex_config:
                      title: { text: "°F" }
                  - id: rh
                    opposite: true
                    min: 0
                    max: 100
                    decimals: 0
                    apex_config:
                      title: { text: "% RH" }
                series:
                  - entity: sensor.weewx_outdoor_temperature
                    name: Outdoor temp
                    yaxis_id: temp
                    stroke_width: 2
                    curve: smooth
                    color: '#1f77b4'
                  - entity: sensor.weewx_dewpoint_3
                    name: Dewpoint
                    yaxis_id: temp
                    stroke_width: 2
                    curve: smooth
                    color: '#2ca02c'
                    opacity: 0.5
                  - entity: sensor.ecowitt_indoor_temperature
                    name: Indoor temp
                    yaxis_id: temp
                    stroke_width: 1
                    curve: smooth
                    color: '#ff7f0e'
                    opacity: 0.6
                  - entity: sensor.weewx_outdoor_humidity
                    name: Outdoor RH
                    yaxis_id: rh
                    stroke_width: 1
                    curve: smooth
                    color: '#9467bd'
                    opacity: 0.4
              - type: custom:apexcharts-card
                header:
                  show: true
                  title: Wind & Rain (24h)
                  show_states: true
                  colorize_states: true
                graph_span: 24h
                apex_config:
                  chart:
                    height: 280
                    stacked: false
                  legend:
                    position: bottom
                yaxis:
                  - id: wind
                    decimals: 0
                    apex_config:
                      title: { text: "mph" }
                  - id: rain
                    opposite: true
                    decimals: 2
                    apex_config:
                      title: { text: "in/h" }
                series:
                  - entity: sensor.weewx_wind_speed_2
                    name: Wind
                    yaxis_id: wind
                    curve: smooth
                    color: '#17becf'
                  - entity: sensor.weewx_wind_gust_2
                    name: Gust
                    yaxis_id: wind
                    curve: smooth
                    stroke_width: 1
                    opacity: 0.5
                    color: '#bcbd22'
                  - entity: sensor.weewx_rain_rate_2
                    name: Rain rate
                    yaxis_id: rain
                    type: area
                    curve: stepline
                    color: '#1f77b4'
                    opacity: 0.5

          # Barometer — full width, 48h span. Slow-moving curve benefits
          # from the extra horizontal space + longer time window than the
          # two charts above.
          - type: custom:apexcharts-card
            header:
              show: true
              title: Barometric Pressure (48h)
              show_states: true
              colorize_states: true
            graph_span: 48h
            span:
              end: minute
            apex_config:
              chart:
                height: 220
              legend:
                position: bottom
            yaxis:
              - id: p
                decimals: 2
                apex_config:
                  title: { text: "inHg" }
            series:
              - entity: sensor.weewx_barometer_2
                name: Sea-level pressure
                yaxis_id: p
                stroke_width: 2
                curve: smooth
                color: '#9467bd'

          # ============================================================
          # IRRIGATION ADVISOR
          # ET soil-water-balance model + heat-stress counter.
          # Advice-only (no sprinkler control).
          # ============================================================
          - type: custom:stack-in-card
            cards:
              # --- Section header ---
              - type: markdown
                content: "## 🌱 Irrigation Advisor"
                style: "ha-card { box-shadow: none; padding: 8px 16px 0; }"

              # --- Lawn advice chip row ---
              - type: custom:mushroom-template-card
                primary: >-
                  {{ states('sensor.irrigation_lawn_advice') }}
                secondary: >-
                  Deficit {{ states('sensor.irrigation_lawn_deficit') | round(2) }}" · ET today {{ states('sensor.irrigation_et0_today') | round(3) }}" · 7-day rain {{ states('sensor.rain_this_week') | round(2) }}" · Next 48h {{ states('sensor.irrigation_forecast_rain_48h') | round(2) }}"
                icon: >-
                  {% set adv = states('sensor.irrigation_lawn_advice') %}
                  {% if 'Water lawn' in adv %}mdi:sprinkler
                  {% elif 'Skip' in adv %}mdi:weather-rainy
                  {% else %}mdi:grass{% endif %}
                icon_color: >-
                  {% set adv = states('sensor.irrigation_lawn_advice') %}
                  {% if 'Water lawn' in adv %}
                    {% set d = states('sensor.irrigation_lawn_deficit') | float(0) %}
                    {{ 'red' if d > 0.6 else 'amber' }}
                  {% elif 'Skip' in adv %}blue
                  {% else %}green{% endif %}
                tap_action:
                  action: more-info
                  entity: sensor.irrigation_lawn_advice

              # --- Lawn run-time line ---
              - type: custom:mushroom-template-card
                primary: >-
                  Run time: {{ states('sensor.irrigation_lawn_runtime') }}
                secondary: >-
                  Sprinkler rate {{ states('input_number.irrigation_sprinkler_rate') }} in/h · Trigger ≥ 0.375", target 1.0"
                icon: mdi:timer-outline
                icon_color: grey

              # --- Planter advice chip ---
              - type: custom:mushroom-template-card
                primary: >-
                  {{ states('sensor.irrigation_planter_advice') }}
                secondary: >-
                  {% set hd = state_attr('sensor.irrigation_planter_advice', 'heat_days') %}
                  Heat stress days (rolling): {{ states('sensor.irrigation_planter_advice') }}
                  {%- set pl = state_attr('sensor.irrigation_planter_advice', 'last_watered') %}
                  {%- if pl %} · Last watered {{ pl }}{% endif %}
                icon: mdi:flower
                icon_color: >-
                  {% set adv = states('sensor.irrigation_planter_advice') %}
                  {% if 'now' in adv %}red
                  {% elif 'Check' in adv %}amber
                  {% else %}green{% endif %}
                tap_action:
                  action: more-info
                  entity: sensor.irrigation_planter_advice

              # --- Watered buttons (row) ---
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: Watered lawn today
                    icon: mdi:grass
                    icon_color: blue
                    tap_action:
                      action: toggle
                      entity: input_boolean.irrigation_lawn_watered
                  - type: custom:mushroom-template-card
                    primary: Watered planters today
                    icon: mdi:flower
                    icon_color: teal
                    tap_action:
                      action: toggle
                      entity: input_boolean.irrigation_planters_watered

              # --- Settings (fold) ---
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Irrigation Settings
                entities:
                  - entity: input_number.irrigation_sprinkler_rate
                    name: Sprinkler Rate (in/h)

title: HVAC Zones
views:
  - title: Overview
    path: overview
    icon: mdi:hvac
    cards:
      # Row 1: Master Bedroom, First Floor
      - type: grid
        columns: 2
        square: false
        cards:
          - type: vertical-stack
            cards:
              - type: thermostat
                show_current_as_primary: true
                entity: climate.master_bedroom
                features:
                  - type: target-temperature
              - type: entities
                entities:
                  - type: custom:fold-entity-row
                    head:
                      entity: sensor.keenect_vent_mbr
                      name: "MBR Details"
                    entities:
                      - entity: light.keen_mbr_1
                        name: Vent 1
                      - entity: light.keen_mbr_2
                        name: Vent 2
                      - entity: sensor.keen_mbr_1_battery
                        name: Vent 1 Battery
                      - entity: sensor.keen_mbr_2_battery
                        name: Vent 2 Battery
                      - entity: input_boolean.circ_optout_mbr
                        name: Circulation Opt-out
                      - entity: input_boolean.away_mbr
                        name: Away Mode

          - type: vertical-stack
            cards:
              - type: thermostat
                show_current_as_primary: true
                entity: climate.first_floor
                features:
                  - type: target-temperature
              - type: entities
                entities:
                  - type: custom:fold-entity-row
                    head:
                      entity: sensor.keenect_vent_first_floor
                      name: "1st Floor Details"
                    entities:
                      - entity: input_boolean.circ_optout_first_floor
                        name: Circulation Opt-out
                      - entity: input_boolean.away_first_floor
                        name: Away Mode

      # Row 2: Ben's Room, Gene's Room
      - type: grid
        columns: 2
        square: false
        cards:
          - type: vertical-stack
            cards:
              - type: thermostat
                show_current_as_primary: true
                entity: climate.ben_s_room
                features:
                  - type: target-temperature
              - type: entities
                entities:
                  - type: custom:fold-entity-row
                    head:
                      entity: sensor.keenect_vent_ben
                      name: "Ben Details"
                    entities:
                      - entity: light.keen_ben
                        name: Vent
                      - entity: sensor.keen_ben_battery
                        name: Vent Battery
                      - entity: input_boolean.circ_optout_ben
                        name: Circulation Opt-out
                      - entity: input_boolean.away_ben
                        name: Away Mode

          - type: vertical-stack
            cards:
              - type: thermostat
                show_current_as_primary: true
                entity: climate.gene_s_room
                features:
                  - type: target-temperature
              - type: entities
                entities:
                  - type: custom:fold-entity-row
                    head:
                      entity: sensor.keenect_vent_gene
                      name: "Gene Details"
                    entities:
                      - entity: light.keen_gene
                        name: Vent
                      - entity: sensor.keen_gene_battery
                        name: Vent Battery
                      - entity: input_boolean.circ_optout_gene
                        name: Circulation Opt-out
                      - entity: input_boolean.away_gene
                        name: Away Mode

      # Row 3: Controls (below zones)
      - type: entities
        title: HVAC Control
        show_header_toggle: false
        entities:
          - entity: input_boolean.keenect_enabled
            name: Keenect Enabled
            tap_action:
              action: toggle
              confirmation:
                text: "Toggle Keenect system on/off?"
          - entity: sensor.keenect_status
            name: Status
          - entity: sensor.keenect_anomalies
            name: Anomalies
          - type: custom:fold-entity-row
            head:
              type: section
              label: "Zone Learning"
            entities:
              - entity: sensor.keenect_zone_rates
              - entity: sensor.keenect_rate_ben
                name: Ben
              - entity: sensor.keenect_rate_gene
                name: Gene
              - entity: sensor.keenect_rate_mbr
                name: Master BR
              - entity: sensor.keenect_rate_first_floor
                name: 1st Floor
          - type: custom:fold-entity-row
            head:
              type: section
              label: "Overnight Heat Loss"
            entities:
              - entity: sensor.keenect_drift
              - entity: sensor.keenect_drift_ben
                name: Ben
              - entity: sensor.keenect_drift_gene
                name: Gene
              - entity: sensor.keenect_drift_mbr
                name: Master BR
              - entity: sensor.keenect_drift_first_floor
                name: 1st Floor
              - entity: sensor.keenect_drift_master_bath
                name: Master Bath
              - entity: sensor.keenect_drift_office
                name: Office
              - entity: sensor.keenect_drift_basement
                name: Basement
              - entity: sensor.keenect_drift_guest_bedroom
                name: Guest Bedroom
          - entity: input_select.hvac_mode
            name: HVAC Mode
            tap_action:
              action: more-info
              confirmation:
                text: "Change HVAC mode?"
          - type: custom:fold-entity-row
            head:
              type: section
              label: Cost
            entities:
              - entity: sensor.hvac_heat_cost_daily
                name: Today Heating
              - entity: sensor.hvac_heat_cost_monthly
                name: This Month Heating
              - entity: sensor.hvac_heat_runtime_daily
                name: Heat Runtime Today
              - entity: sensor.hvac_heat_runtime_monthly
                name: Heat Runtime Month
              - entity: sensor.hvac_cool_cost_daily
                name: Today Cooling
              - entity: sensor.hvac_cool_cost_monthly
                name: This Month Cooling
              - entity: sensor.hvac_cool_runtime_daily
                name: Cool Runtime Today
              - entity: sensor.hvac_cool_runtime_monthly
                name: Cool Runtime Month

  - title: Activity
    path: activity
    icon: mdi:history
    cards:
      - type: markdown
        title: Setpoint Changes
        content: >
          {% set entries = state_attr('sensor.keenect_setpoint_log', 'entries') %}
          {% if entries %}{% for e in entries %}
          **{{ e.time }}** · {{ e.zone }} · {{ e.type }} · {{ e.old | int }}→{{ e.new | int }}°F · *{{ e.user }}*

          {% endfor %}{% else %}
          *No setpoint changes recorded yet.*
          {% endif %}

  - title: History
    path: history
    icon: mdi:chart-line
    cards:
      - type: history-graph
        title: HVAC State
        hours_to_show: 24
        entities:
          - entity: sensor.keenect_status
            name: HVAC State

      - type: history-graph
        title: Zone Temperatures
        hours_to_show: 24
        entities:
          - entity: sensor.gw1000_temp_ch7
            name: Ben
          - entity: sensor.gw1000_temp_ch6
            name: Gene
          - entity: sensor.gw1000_temp_ch4
            name: Master BR
          - entity: sensor.gw1000_indoor_temperature
            name: 1st Floor
          - entity: sensor.outdoor_temperature
            name: Outdoor
          - entity: sensor.master_bathroom_temperature_temperature
            name: Master Bath
          - entity: sensor.office_temperature_sonoff_temperature
            name: Office
          - entity: sensor.basement_sonoff_temperature
            name: Basement
          - entity: sensor.guest_bedroom_sonoff_temperature
            name: Guest Bedroom

      - type: history-graph
        title: Zone Humidity
        hours_to_show: 24
        entities:
          - entity: sensor.gw1000_humidity_ch7
            name: Ben
          - entity: sensor.gw1000_humidity_ch6
            name: Gene
          - entity: sensor.gw1000_humidity_ch4
            name: Master BR
          - entity: sensor.gw1000_indoor_humidity
            name: 1st Floor
          - entity: sensor.outdoor_humidity
            name: Outdoor
          - entity: sensor.master_bathroom_temperature_humidity
            name: Master Bath
          - entity: sensor.office_temperature_sonoff_humidity
            name: Office
          - entity: sensor.basement_sonoff_humidity
            name: Basement
          - entity: sensor.guest_bedroom_sonoff_humidity
            name: Guest Bedroom
          - entity: sensor.hvac_controller_supply_humidity
            name: Supply Duct
          - entity: sensor.hvac_controller_return_humidity
            name: Return Duct

      - type: history-graph
        title: Vent Positions
        hours_to_show: 24
        entities:
          - entity: sensor.keenect_vent_ben
            name: Ben
          - entity: sensor.keenect_vent_gene
            name: Gene
          - entity: sensor.keenect_vent_mbr
            name: Master BR
          - entity: sensor.keenect_vent_first_floor
            name: 1st Floor Servo

      - type: history-graph
        title: Daily Heating
        hours_to_show: 168
        entities:
          - entity: sensor.hvac_heat_runtime_daily
            name: Heat Hours
          - entity: sensor.hvac_heat_cost_daily
            name: Heat Cost ($)

      - type: history-graph
        title: Daily Cooling
        hours_to_show: 168
        entities:
          - entity: sensor.hvac_cool_runtime_daily
            name: Cool Hours
          - entity: sensor.hvac_cool_cost_daily
            name: Cool Cost ($)

  - title: Config
    path: config
    icon: mdi:cog
    cards:
      # Status / Apply card
      - type: entities
        title: Zone Configuration
        entities:
          - entity: input_button.keenect_apply_config
            name: Apply Config Changes
          - type: button
            name: Reload Pyscript
            icon: mdi:restart
            tap_action:
              action: call-service
              service: pyscript.reload
              confirmation:
                text: "Reload pyscript? Needed after changing sensor/thermostat entities."

      # Zone enable/disable toggles (always visible)
      - type: entities
        title: "Active Zones"
        show_header_toggle: false
        entities:
          - entity: input_boolean.keenect_zone_1_enabled
            name: "Zone 1 (ben)"
          - entity: input_boolean.keenect_zone_2_enabled
            name: "Zone 2 (gene)"
          - entity: input_boolean.keenect_zone_3_enabled
            name: "Zone 3 (mbr)"
          - entity: input_boolean.keenect_zone_4_enabled
            name: "Zone 4 (first_floor)"
      - type: entities
        title: "Passive Zones"
        show_header_toggle: false
        entities:
          - entity: input_boolean.keenect_passive_1_enabled
            name: "Passive 1 (master_bath)"
          - entity: input_boolean.keenect_passive_2_enabled
            name: "Passive 2 (office)"
          - entity: input_boolean.keenect_passive_3_enabled
            name: "Passive 3 (basement)"
          - entity: input_boolean.keenect_passive_4_enabled
            name: "Passive 4 (guest_bedroom)"

      # Active zones (1-column grid - full width for long entity names)
      - type: grid
        columns: 1
        square: false
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.keenect_zone_1_enabled
                state: "on"
            card:
              type: entities
              title: "Zone 1"
              show_header_toggle: false
              entities:
                - entity: input_text.keenect_zone_1_name
                  name: Zone Name
                - entity: input_select.keenect_zone_1_temp_sensor
                  name: Temperature Sensor
                - entity: input_select.keenect_zone_1_thermostat
                  name: Thermostat
                - entity: input_select.keenect_zone_1_vent_1
                  name: Vent 1
                - entity: input_select.keenect_zone_1_vent_2
                  name: Vent 2
                - entity: input_select.keenect_zone_1_vent_type
                  name: Vent Type
                - entity: input_select.keenect_zone_1_vent_control
                  name: Vent Control
                - type: custom:fold-entity-row
                  head:
                    type: section
                    label: Vent Limits
                  entities:
                    - entity: input_number.keenect_zone_1_heat_min_vo
                      name: Heat Min
                    - entity: input_number.keenect_zone_1_heat_max_vo
                      name: Heat Max
                    - entity: input_number.keenect_zone_1_cool_min_vo
                      name: Cool Min
                    - entity: input_number.keenect_zone_1_cool_max_vo
                      name: Cool Max
                    - entity: input_number.keenect_zone_1_fan_vo
                      name: Fan
                - type: custom:fold-entity-row
                  head:
                    type: section
                    label: Default Setpoints
                  entities:
                    - entity: input_number.keenect_zone_1_heat_default
                      name: Heat Default
                    - entity: input_number.keenect_zone_1_cool_default
                      name: Cool Default

          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.keenect_zone_2_enabled
                state: "on"
            card:
              type: entities
              title: "Zone 2"
              show_header_toggle: false
              entities:
                - entity: input_text.keenect_zone_2_name
                  name: Zone Name
                - entity: input_select.keenect_zone_2_temp_sensor
                  name: Temperature Sensor
                - entity: input_select.keenect_zone_2_thermostat
                  name: Thermostat
                - entity: input_select.keenect_zone_2_vent_1
                  name: Vent 1
                - entity: input_select.keenect_zone_2_vent_2
                  name: Vent 2
                - entity: input_select.keenect_zone_2_vent_type
                  name: Vent Type
                - entity: input_select.keenect_zone_2_vent_control
                  name: Vent Control
                - type: custom:fold-entity-row
                  head:
                    type: section
                    label: Vent Limits
                  entities:
                    - entity: input_number.keenect_zone_2_heat_min_vo
                      name: Heat Min
                    - entity: input_number.keenect_zone_2_heat_max_vo
                      name: Heat Max
                    - entity: input_number.keenect_zone_2_cool_min_vo
                      name: Cool Min
                    - entity: input_number.keenect_zone_2_cool_max_vo
                      name: Cool Max
                    - entity: input_number.keenect_zone_2_fan_vo
                      name: Fan
                - type: custom:fold-entity-row
                  head:
                    type: section
                    label: Default Setpoints
                  entities:
                    - entity: input_number.keenect_zone_2_heat_default
                      name: Heat Default
                    - entity: input_number.keenect_zone_2_cool_default
                      name: Cool Default

          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.keenect_zone_3_enabled
                state: "on"
            card:
              type: entities
              title: "Zone 3"
              show_header_toggle: false
              entities:
                - entity: input_text.keenect_zone_3_name
                  name: Zone Name
                - entity: input_select.keenect_zone_3_temp_sensor
                  name: Temperature Sensor
                - entity: input_select.keenect_zone_3_thermostat
                  name: Thermostat
                - entity: input_select.keenect_zone_3_vent_1
                  name: Vent 1
                - entity: input_select.keenect_zone_3_vent_2
                  name: Vent 2
                - entity: input_select.keenect_zone_3_vent_type
                  name: Vent Type
                - entity: input_select.keenect_zone_3_vent_control
                  name: Vent Control
                - type: custom:fold-entity-row
                  head:
                    type: section
                    label: Vent Limits
                  entities:
                    - entity: input_number.keenect_zone_3_heat_min_vo
                      name: Heat Min
                    - entity: input_number.keenect_zone_3_heat_max_vo
                      name: Heat Max
                    - entity: input_number.keenect_zone_3_cool_min_vo
                      name: Cool Min
                    - entity: input_number.keenect_zone_3_cool_max_vo
                      name: Cool Max
                    - entity: input_number.keenect_zone_3_fan_vo
                      name: Fan
                - type: custom:fold-entity-row
                  head:
                    type: section
                    label: Default Setpoints
                  entities:
                    - entity: input_number.keenect_zone_3_heat_default
                      name: Heat Default
                    - entity: input_number.keenect_zone_3_cool_default
                      name: Cool Default

          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.keenect_zone_4_enabled
                state: "on"
            card:
              type: entities
              title: "Zone 4"
              show_header_toggle: false
              entities:
                - entity: input_text.keenect_zone_4_name
                  name: Zone Name
                - entity: input_select.keenect_zone_4_temp_sensor
                  name: Temperature Sensor
                - entity: input_select.keenect_zone_4_thermostat
                  name: Thermostat
                - entity: input_select.keenect_zone_4_vent_1
                  name: Vent 1
                - entity: input_select.keenect_zone_4_vent_2
                  name: Vent 2
                - entity: input_select.keenect_zone_4_vent_type
                  name: Vent Type
                - entity: input_select.keenect_zone_4_vent_control
                  name: Vent Control
                - type: custom:fold-entity-row
                  head:
                    type: section
                    label: Vent Limits
                  entities:
                    - entity: input_number.keenect_zone_4_heat_min_vo
                      name: Heat Min
                    - entity: input_number.keenect_zone_4_heat_max_vo
                      name: Heat Max
                    - entity: input_number.keenect_zone_4_cool_min_vo
                      name: Cool Min
                    - entity: input_number.keenect_zone_4_cool_max_vo
                      name: Cool Max
                    - entity: input_number.keenect_zone_4_fan_vo
                      name: Fan
                - type: custom:fold-entity-row
                  head:
                    type: section
                    label: Default Setpoints
                  entities:
                    - entity: input_number.keenect_zone_4_heat_default
                      name: Heat Default
                    - entity: input_number.keenect_zone_4_cool_default
                      name: Cool Default

      # Passive zones (1-column grid - full width for long entity names)
      - type: grid
        columns: 1
        square: false
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.keenect_passive_1_enabled
                state: "on"
            card:
              type: entities
              title: "Passive Zone 1"
              show_header_toggle: false
              entities:
                - entity: input_text.keenect_passive_1_name
                  name: Zone Name
                - entity: input_select.keenect_passive_1_temp_sensor
                  name: Temperature Sensor

          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.keenect_passive_2_enabled
                state: "on"
            card:
              type: entities
              title: "Passive Zone 2"
              show_header_toggle: false
              entities:
                - entity: input_text.keenect_passive_2_name
                  name: Zone Name
                - entity: input_select.keenect_passive_2_temp_sensor
                  name: Temperature Sensor

          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.keenect_passive_3_enabled
                state: "on"
            card:
              type: entities
              title: "Passive Zone 3"
              show_header_toggle: false
              entities:
                - entity: input_text.keenect_passive_3_name
                  name: Zone Name
                - entity: input_select.keenect_passive_3_temp_sensor
                  name: Temperature Sensor

          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.keenect_passive_4_enabled
                state: "on"
            card:
              type: entities
              title: "Passive Zone 4"
              show_header_toggle: false
              entities:
                - entity: input_text.keenect_passive_4_name
                  name: Zone Name
                - entity: input_select.keenect_passive_4_temp_sensor
                  name: Temperature Sensor

      # System settings (moved from Overview)
      - type: entities
        title: System Settings
        show_header_toggle: false
        entities:
          - entity: input_number.keenect_hysteresis
            name: Hysteresis
          - entity: input_number.vent_closure_delay
            name: Vent Closure Delay
          - entity: input_number.cool_lockout_temp
            name: Cool Lockout Temp
          - entity: input_number.away_heat_setpoint
            name: Away Heat Setpoint
          - entity: input_number.away_cool_setpoint
            name: Away Cool Setpoint
          - entity: input_boolean.enable_recirculation
            name: Smart Recirculation
          - entity: input_number.recirculation_delay
            name: Recirculation Delay
          - entity: input_boolean.enable_circulation
            name: Continuous Circulation
      - type: entities
        title: Energy Tracking
        show_header_toggle: false
        entities:
          - entity: input_number.furnace_btu_input
            name: Furnace BTU/h
          - entity: input_number.gas_rate_per_therm
            name: Gas $/therm
          - entity: input_number.ac_wattage
            name: AC Wattage
          - entity: sensor.current_electric_rate
            name: Electric $/kWh

      # Add zone guidance
      - type: markdown
        content: >
          ### Adding Zones

          To add a new active zone, enable it in Home Assistant via its
          `input_boolean.keenect_zone_N_enabled` helper — the zone card will
          appear here automatically. Fill in the zone name, sensor, thermostat,
          and vent assignments, then toggle **Apply Config Changes** to activate.

          To add a passive zone (temperature monitoring only, no vents), enable
          `input_boolean.keenect_passive_N_enabled` the same way.

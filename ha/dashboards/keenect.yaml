title: HVAC Zones
views:
  - title: Overview
    path: overview
    icon: mdi:hvac
    cards:
      # Row 1: Master Bedroom, First Floor
      - type: grid
        columns: 2
        square: false
        cards:
          - type: vertical-stack
            cards:
              - type: thermostat
                show_current_as_primary: true
                entity: climate.master_bedroom
              - type: entities
                entities:
                  - type: custom:fold-entity-row
                    head:
                      entity: sensor.keenect_vent_mbr
                      name: "MBR Details"
                    entities:
                      - entity: light.keen_mbr_1
                        name: Vent 1
                      - entity: light.keen_mbr_2
                        name: Vent 2
                      - entity: sensor.keen_mbr_1_battery
                        name: Vent 1 Battery
                      - entity: sensor.keen_mbr_2_battery
                        name: Vent 2 Battery
                      - entity: input_boolean.circ_optout_mbr
                        name: Circulation Opt-out

          - type: vertical-stack
            cards:
              - type: thermostat
                show_current_as_primary: true
                entity: climate.first_floor
              - type: entities
                entities:
                  - type: custom:fold-entity-row
                    head:
                      entity: sensor.keenect_vent_first_floor
                      name: "1st Floor Details"
                    entities:
                      - entity: input_boolean.circ_optout_first_floor
                        name: Circulation Opt-out

      # Row 2: Ben's Room, Gene's Room
      - type: grid
        columns: 2
        square: false
        cards:
          - type: vertical-stack
            cards:
              - type: thermostat
                show_current_as_primary: true
                entity: climate.ben_s_room
              - type: entities
                entities:
                  - type: custom:fold-entity-row
                    head:
                      entity: sensor.keenect_vent_ben
                      name: "Ben Details"
                    entities:
                      - entity: light.keen_ben
                        name: Vent
                      - entity: sensor.keen_ben_battery
                        name: Vent Battery
                      - entity: input_boolean.circ_optout_ben
                        name: Circulation Opt-out

          - type: vertical-stack
            cards:
              - type: thermostat
                show_current_as_primary: true
                entity: climate.gene_s_room
              - type: entities
                entities:
                  - type: custom:fold-entity-row
                    head:
                      entity: sensor.keenect_vent_gene
                      name: "Gene Details"
                    entities:
                      - entity: light.keen_gene
                        name: Vent
                      - entity: sensor.keen_gene_battery
                        name: Vent Battery
                      - entity: input_boolean.circ_optout_gene
                        name: Circulation Opt-out

      # Row 3: Controls (below zones)
      - type: entities
        title: HVAC Control
        show_header_toggle: false
        entities:
          - entity: input_boolean.keenect_enabled
            name: Keenect Enabled
            tap_action:
              action: toggle
              confirmation:
                text: "Toggle Keenect system on/off?"
          - entity: sensor.keenect_status
            name: Status
          - entity: input_select.hvac_mode
            name: HVAC Mode
            tap_action:
              action: more-info
              confirmation:
                text: "Change HVAC mode?"
          - type: custom:fold-entity-row
            head:
              type: section
              label: Cost
            entities:
              - entity: sensor.hvac_heat_cost_daily
                name: Today Heating
              - entity: sensor.hvac_heat_cost_monthly
                name: This Month Heating
              - entity: sensor.hvac_heat_runtime_daily
                name: Today Runtime
              - entity: sensor.hvac_heat_runtime_monthly
                name: This Month Runtime
          - type: custom:fold-entity-row
            head:
              type: section
              label: Settings
            entities:
              - entity: input_number.cool_lockout_temp
                name: Cool Lockout Temp
              - entity: input_number.keenect_hysteresis
                name: Hysteresis
              - entity: input_number.vent_closure_delay
                name: Vent Closure Delay
              - entity: input_boolean.enable_recirculation
                name: Smart Recirculation
              - entity: input_number.recirculation_delay
                name: Recirculation Delay
              - entity: input_boolean.enable_circulation
                name: Continuous Circulation
              - entity: input_number.furnace_btu_input
                name: Furnace BTU/h
              - entity: input_number.gas_price_per_therm
                name: Gas $/therm

  - title: Activity
    path: activity
    icon: mdi:history
    cards:
      - type: markdown
        title: Setpoint Changes
        content: >-
          {% set entries = state_attr('sensor.keenect_setpoint_log', 'entries') %}
          {% if entries %}
          {% for e in entries %}
          **{{ e.time }}** · {{ e.zone }} {{ e.type }} · {{ e.old }}→{{ e.new }}°F · *{{ e.user }}*
          {% endfor %}
          {% else %}
          *No setpoint changes recorded yet.*
          {% endif %}

  - title: History
    path: history
    icon: mdi:chart-line
    cards:
      - type: history-graph
        title: HVAC State
        hours_to_show: 24
        entities:
          - entity: sensor.keenect_status
            name: HVAC State

      - type: history-graph
        title: Zone Temperatures
        hours_to_show: 24
        entities:
          - entity: sensor.gw1000_temp_ch4
            name: Ben
          - entity: sensor.gw1000_temp_ch6
            name: Gene
          - entity: sensor.gw1000_temp_ch7
            name: Master BR
          - entity: sensor.gw1000_indoor_temperature
            name: 1st Floor
          - entity: sensor.outdoor_temperature
            name: Outdoor

      - type: history-graph
        title: Vent Positions
        hours_to_show: 24
        entities:
          - entity: sensor.keenect_vent_ben
            name: Ben
          - entity: sensor.keenect_vent_gene
            name: Gene
          - entity: sensor.keenect_vent_mbr
            name: Master BR
          - entity: sensor.keenect_vent_first_floor
            name: 1st Floor Servo

# Barometer 48-hour aggregate statistics.
# Used by the kindle dashboard's BAROMETER · 48H panel to show min/max/mean
# instead of a chart (sibbl's puppeteer renderer doesn't draw chart x-axis labels).

sensor:
  - platform: statistics
    name: "Barometer 48h Max"
    unique_id: barometer_48h_max
    entity_id: sensor.weewx_barometer_2
    state_characteristic: value_max
    max_age:
      hours: 48
    sampling_size: 600
    precision: 2

  - platform: statistics
    name: "Barometer 48h Min"
    unique_id: barometer_48h_min
    entity_id: sensor.weewx_barometer_2
    state_characteristic: value_min
    max_age:
      hours: 48
    sampling_size: 600
    precision: 2

  - platform: statistics
    name: "Barometer 48h Mean"
    unique_id: barometer_48h_mean
    entity_id: sensor.weewx_barometer_2
    state_characteristic: mean
    max_age:
      hours: 48
    sampling_size: 600
    precision: 2

  keenect_zone_3_vent_control:
    name: "Zone 3 Vent Control"
    options:
      - Aggressive
      - Proportional
    icon: mdi:tune
    initial: Aggressive

  # --- Zone 4 (first_floor) ---
  keenect_zone_4_temp_sensor:
    name: "Zone 4 Temp Sensor"
    options:
      - "(none)"
    icon: mdi:thermometer

  keenect_zone_4_thermostat:
    name: "Zone 4 Thermostat"

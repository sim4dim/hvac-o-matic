# keenect_zones.yaml
# Home Assistant package: GUI-based keenect zone configuration helpers
# 4 active zone slots (zone_1 through zone_4)
# 4 passive zone slots (passive_1 through passive_4)
# input_select options are populated by pyscript on startup

input_boolean:

  # --- Active Zone Enabled ---
  keenect_zone_1_enabled:
    name: "Zone 1 Enabled"
    icon: mdi:check-circle
    initial: true

  keenect_zone_2_enabled:
    name: "Zone 2 Enabled"
    icon: mdi:check-circle
    initial: true

  keenect_zone_3_enabled:
    name: "Zone 3 Enabled"
    icon: mdi:check-circle
    initial: true

  keenect_zone_4_enabled:
    name: "Zone 4 Enabled"
    icon: mdi:check-circle
    initial: true

  # --- Passive Zone Enabled ---
  keenect_passive_1_enabled:
    name: "Passive Zone 1 Enabled"
    icon: mdi:check-circle
    initial: true

  keenect_passive_2_enabled:
    name: "Passive Zone 2 Enabled"
    icon: mdi:check-circle
    initial: true

  keenect_passive_3_enabled:
    name: "Passive Zone 3 Enabled"
    icon: mdi:check-circle
    initial: true

  keenect_passive_4_enabled:
    name: "Passive Zone 4 Enabled"
    icon: mdi:check-circle
    initial: true

input_button:
  keenect_apply_config:
    name: "Apply Keenect Config"
    icon: mdi:check-all


input_text:

  # --- Active Zone Names ---
  keenect_zone_1_name:
    name: "Zone 1 Name"
    max: 40
    icon: mdi:label
    initial: "ben"

  keenect_zone_2_name:
    name: "Zone 2 Name"
    max: 40
    icon: mdi:label
    initial: "gene"

  keenect_zone_3_name:
    name: "Zone 3 Name"
    max: 40
    icon: mdi:label
    initial: "mbr"

  keenect_zone_4_name:
    name: "Zone 4 Name"
    max: 40
    icon: mdi:label
    initial: "first_floor"

  # --- Passive Zone Names ---
  keenect_passive_1_name:
    name: "Passive Zone 1 Name"
    max: 40
    icon: mdi:label
    initial: "master_bath"

  keenect_passive_2_name:
    name: "Passive Zone 2 Name"
    max: 40
    icon: mdi:label
    initial: "office"

  keenect_passive_3_name:
    name: "Passive Zone 3 Name"
    max: 40
    icon: mdi:label
    initial: "basement"

  keenect_passive_4_name:
    name: "Passive Zone 4 Name"
    max: 40
    icon: mdi:label
    initial: "guest_bedroom"

  # --- Persistence (hidden backing store for input_select survival across restarts) ---
  keenect_zone_1_persist:
    name: "Zone 1 Config Persist"
    max: 255
    icon: mdi:content-save
  keenect_zone_2_persist:
    name: "Zone 2 Config Persist"
    max: 255
    icon: mdi:content-save
  keenect_zone_3_persist:
    name: "Zone 3 Config Persist"
    max: 255
    icon: mdi:content-save
  keenect_zone_4_persist:
    name: "Zone 4 Config Persist"
    max: 255
    icon: mdi:content-save
  keenect_passive_1_persist:
    name: "Passive 1 Config Persist"
    max: 255
    icon: mdi:content-save
  keenect_passive_2_persist:
    name: "Passive 2 Config Persist"
    max: 255
    icon: mdi:content-save
  keenect_passive_3_persist:
    name: "Passive 3 Config Persist"
    max: 255
    icon: mdi:content-save
  keenect_passive_4_persist:
    name: "Passive 4 Config Persist"
    max: 255
    icon: mdi:content-save


input_select:

  # --- Zone 1 (ben) ---
  keenect_zone_1_temp_sensor:
    name: "Zone 1 Temp Sensor"
    options:
      - "(none)"
    icon: mdi:thermometer

  keenect_zone_1_thermostat:
    name: "Zone 1 Thermostat"
    options:
      - "(none)"
    icon: mdi:thermostat

  keenect_zone_1_vent_1:
    name: "Zone 1 Vent 1"
    options:
      - "(none)"
    icon: mdi:air-filter

  keenect_zone_1_vent_2:
    name: "Zone 1 Vent 2"
    options:
      - "(none)"
    icon: mdi:air-filter

  keenect_zone_1_vent_type:
    name: "Zone 1 Vent Type"
    options:
      - light
      - number
    icon: mdi:format-list-bulleted
    initial: light

  keenect_zone_1_vent_control:
    name: "Zone 1 Vent Control"
    options:
      - Aggressive
      - Proportional
    icon: mdi:tune
    initial: Aggressive

  # --- Zone 2 (gene) ---

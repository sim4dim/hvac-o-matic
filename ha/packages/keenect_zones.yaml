input_number:

  # --- Zone 1 (ben) ---
  keenect_zone_1_heat_min_vo:
    name: "Zone 1 Heat Min VO"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:arrow-collapse-down
    mode: box
    initial: 15

  keenect_zone_1_heat_max_vo:
    name: "Zone 1 Heat Max VO"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"

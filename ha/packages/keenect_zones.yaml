  # --- Passive Zone Temp Sensors ---
  keenect_passive_1_temp_sensor:
    name: "Passive Zone 1 Temp Sensor"
    options:
      - "(none)"
    icon: mdi:thermometer

  keenect_passive_2_temp_sensor:
    name: "Passive Zone 2 Temp Sensor"

# Irrigation Advisor — HA input helpers
# input_text.irrigation_state is created via WS API (NOT here), same pattern as keenect_persisted_state.

input_number:
  irrigation_sprinkler_rate:
    name: Sprinkler Rate
    min: 0.1
    max: 2.0
    step: 0.05
    initial: 0.4
    unit_of_measurement: "in/h"
    icon: mdi:sprinkler

input_boolean:
  irrigation_lawn_watered:
    name: Irrigation Lawn Watered
    icon: mdi:grass

  irrigation_planters_watered:
    name: Irrigation Planters Watered
    icon: mdi:flower

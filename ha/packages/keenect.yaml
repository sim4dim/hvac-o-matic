# Keenect HA - Input helpers for HVAC zone control
# Replaces Hubitat KeenectLiteMaster/Zone configuration

input_select:
  hvac_mode:
    name: HVAC Mode
    options:
      - HEAT
      - COOL
      - "OFF"
    icon: mdi:thermostat

input_number:
  vent_closure_delay:
    name: Vent Closure Delay
    min: 0
    max: 300
    step: 10
    unit_of_measurement: seconds
    icon: mdi:timer-outline

  recirculation_delay:
    name: Recirculation Delay
    min: 5
    max: 60
    step: 5
    unit_of_measurement: minutes
    icon: mdi:fan-clock

  keenect_hysteresis:
    name: Keenect Hysteresis
    min: 0.1
    max: 2.0
    step: 0.1
    unit_of_measurement: "°F"
    icon: mdi:thermometer-lines

  cool_lockout_temp:
    name: Cool Lockout Temp
    min: 30
    max: 70
    step: 1
    unit_of_measurement: "°F"
    icon: mdi:snowflake-alert

  furnace_btu_input:
    name: Furnace BTU Input (per hour)
    min: 10000
    max: 200000
    step: 1000
    unit_of_measurement: "BTU/h"
    icon: mdi:fire

  gas_price_per_therm:
    name: Gas Price per Therm
    min: 0.10
    max: 5.00
    step: 0.01
    unit_of_measurement: "$/therm"
    icon: mdi:currency-usd

  ac_wattage:
    name: AC Wattage
    min: 1000
    max: 10000
    step: 100
    unit_of_measurement: "W"
    icon: mdi:air-conditioner

  electric_price_per_kwh:
    name: Electric Price per kWh
    min: 0.01
    max: 1.00
    step: 0.01
    unit_of_measurement: "$/kWh"
    icon: mdi:flash

  away_heat_setpoint:
    name: Away Heat Setpoint
    min: 45
    max: 65
    step: 1
    unit_of_measurement: "°F"
    icon: mdi:thermometer-low

  away_cool_setpoint:
    name: Away Cool Setpoint
    min: 78
    max: 90
    step: 1
    unit_of_measurement: "°F"
    icon: mdi:thermometer-high

input_boolean:
  keenect_enabled:
    name: Keenect Enabled
    icon: mdi:hvac

  enable_recirculation:
    name: Enable Smart Recirculation
    icon: mdi:fan

  enable_circulation:
    name: Enable Continuous Circulation
    icon: mdi:fan-auto

  away_ben:
    name: "Ben's Room Away"
    icon: mdi:home-export-outline

  away_gene:
    name: "Gene's Room Away"
    icon: mdi:home-export-outline

  away_mbr:
    name: "Master Bedroom Away"
    icon: mdi:home-export-outline

  away_first_floor:
    name: "First Floor Away"
    icon: mdi:home-export-outline

utility_meter:
  hvac_heat_cost_daily:
    source: sensor.hvac_heat_cost
    cycle: daily
  hvac_heat_cost_monthly:
    source: sensor.hvac_heat_cost
    cycle: monthly
  hvac_heat_runtime_daily:
    source: sensor.hvac_heat_runtime
    cycle: daily
  hvac_heat_runtime_monthly:
    source: sensor.hvac_heat_runtime
    cycle: monthly
  hvac_cool_cost_daily:
    source: sensor.hvac_cool_cost
    cycle: daily
  hvac_cool_cost_monthly:
    source: sensor.hvac_cool_cost
    cycle: monthly
  hvac_cool_runtime_daily:
    source: sensor.hvac_cool_runtime
    cycle: daily
  hvac_cool_runtime_monthly:
    source: sensor.hvac_cool_runtime
    cycle: monthly

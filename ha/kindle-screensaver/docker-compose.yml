services:
  kindle-screensaver:
    image: sibbl/hass-lovelace-kindle-screensaver:latest
    container_name: kindle-screensaver
    restart: unless-stopped
    environment:
      HA_BASE_URL: http://192.168.1.151:8123
      HA_SCREENSHOT_URL: /kindle-dash/kindle?kiosk
      HA_ACCESS_TOKEN: ${HA_ACCESS_TOKEN:?set HA_ACCESS_TOKEN in ha/kindle-screensaver/.env (gitignored)}
      CRON_JOB: "* * * * *"
      RENDERING_TIMEOUT: 30000
      RENDERING_DELAY: 3000
      RENDERING_SCREEN_HEIGHT: 800
      RENDERING_SCREEN_WIDTH: 600
      GRAYSCALE_DEPTH: 8
      ROTATION: 0
      OUTPUT_PATH: /output/cover
      PORT: "5000"
      LANGUAGE: en
      SCALING: 1
      TZ: America/New_York
    ports:
      - "5100:5000"
    volumes:
      - ./output:/output
      - /etc/localtime:/etc/localtime:ro
